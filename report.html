
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketing Intelligence Report</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,aspect-ratio"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --font-sans: "Inter", ui-sans-serif, system-ui, sans-serif;
            --font-mono: "JetBrains Mono", ui-monospace, SFMono-Regular, monospace;
        }
        body {
            background-color: #fafafa;
            color: #18181b;
            font-family: var(--font-sans);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .report-shadow {
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.05);
        }
        @media print {
            .no-print {
                display: none !important;
            }
            body {
                background: white;
                padding: 0;
                margin: 0;
            }
            .report-container {
                box-shadow: none !important;
                margin: 0 !important;
                padding: 0 !important;
                border-radius: 0 !important;
            }
            .min-h-screen {
                min-height: 0 !important;
                padding: 0 !important;
            }
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #d4d4d8;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #a1a1aa;
        }
        
        .animate-spin {
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        #app {
            transition: opacity 0.3s ease-in-out;
        }
        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <!-- Libraries for PDF generation - using CDNs as inlining is not feasible for a single file -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script>
        // State Management
        let state = {
            view: 'home',
            reports: [],
            currentReportId: null,
            isGenerating: false,
            isSyncing: false,
            formData: {
                platform: 'Instagram',
                account: '@aira.nextgen',
                postingTime: '3:00 PM',
                preparedFor: 'Gautam',
                preparedForRole: 'Growth Analytics',
                preparedBy: 'Apurv',
                preparedByRole: 'Operations, Development & Marketing Execution',
                timingReason1: '3:00 PM is a high “craving window” (evening snack / coffee time).',
                timingReason2: 'Audience is mentally fatigued post-lunch → More likely to scroll Instagram.',
                postingGoal: 'To create curiosity: People will think, “What is this? How does it work?”',
                additionalContributions: 'Also, I worked on the Team Management System project, handling team operations. I made a report system and set up automation to track team growth. I also prepared strong agreements and useful documents to keep things running smoothly.'
            },
            refImages: [],
            designImages: [],
            extraWorkImages: []
        };

        const DEFAULT_DATA = { ...state.formData };
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzgwMOH84vs8yEigR7Bfro8hmzjFg2OMvKIPIDFKtrgmjQegpMC3lq4iGo4_L19FWK4ag/exec';
        const isLocalFile = window.location.protocol === 'file:';

        // Icons (Lucide equivalents as SVG strings) - Removed fixed width/height for better scaling
        const Icons = {
            Plus: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-full h-full"><path d="M5 12h14"/><path d="M12 5v14"/></svg>',
            RefreshCw: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-full h-full"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>',
            FileText: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-full h-full"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>',
            Calendar: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-full h-full"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>',
            Trash2: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-full h-full"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>',
            CheckCircle2: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-full h-full"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></svg>',
            Edit3: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-full h-full"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>',
            ChevronRight: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-full h-full"><path d="m9 18 6-6-6-6"/></svg>',
            ChevronLeft: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-full h-full"><path d="m15 18-6-6 6-6"/></svg>',
            Eye: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-full h-full"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>',
            Save: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-full h-full"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>',
            Home: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-full h-full"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>',
            Printer: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-full h-full"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/></svg>',
            Download: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-full h-full"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>',
            X: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-full h-full"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>',
            Instagram: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-full h-full"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg>',
            Clock: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-full h-full"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',
            User: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-full h-full"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>',
            Briefcase: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-full h-full"><rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>',
            ImageIcon: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-full h-full"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>'
        };

        // Helper Functions
        function setState(newState) {
            state = { ...state, ...newState };
            render();
        }

        // Persistent Storage Helper
        const Storage = {
            getReports: () => {
                try {
                    const data = localStorage.getItem('aira_reports');
                    return data ? JSON.parse(data) : [];
                } catch (e) {
                    console.error('LocalStorage error:', e);
                    return [];
                }
            },
            saveReport: (report) => {
                const reports = Storage.getReports();
                const index = reports.findIndex(r => r.id === report.id);
                if (index > -1) {
                    reports[index] = report;
                } else {
                    reports.push(report);
                }
                localStorage.setItem('aira_reports', JSON.stringify(reports));
            },
            deleteReport: (id) => {
                const reports = Storage.getReports();
                const filtered = reports.filter(r => r.id !== id);
                localStorage.setItem('aira_reports', JSON.stringify(filtered));
            },
            updateSyncStatus: (id, synced) => {
                const reports = Storage.getReports();
                const report = reports.find(r => r.id === id);
                if (report) {
                    report.synced = synced;
                    localStorage.setItem('aira_reports', JSON.stringify(reports));
                }
            }
        };

        async function fetchReports() {
            // First try to load from localStorage for instant result and file:// support
            const localReports = Storage.getReports();
            setState({ reports: localReports });

            if (isLocalFile) return;

            // Then try to sync with backend if available
            try {
                const res = await fetch('/api/reports');
                if (res.ok) {
                    const reports = await res.json();
                    const normalizedReports = reports.map(r => ({
                        ...r,
                        synced: !!r.synced
                    }));
                    // Merge or replace based on logic - here we replace for simplicity if server is master
                    setState({ reports: normalizedReports });
                    localStorage.setItem('aira_reports', JSON.stringify(normalizedReports));
                }
            } catch (err) {
                console.log('Backend not available, using local storage.');
            }
        }

        async function saveReport() {
            if (!state.currentReportId) return;
            
            const todayDate = new Date().toLocaleDateString('en-GB', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric'
            });

            const payload = {
                id: state.currentReportId,
                createdAt: new Date().toISOString(),
                displayDate: todayDate,
                display_date: todayDate, // For consistency
                data: state.formData,
                images: {
                    refImages: state.refImages,
                    designImages: state.designImages,
                    extraWorkImages: state.extraWorkImages
                },
                synced: false
            };

            // Save to localStorage first (always works)
            Storage.saveReport(payload);
            setState({ reports: Storage.getReports() });

            if (!isLocalFile) {
                // Try to save to backend
                try {
                    const res = await fetch('/api/reports', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (res.ok) {
                        console.log('Saved to backend');
                    }
                } catch (err) {
                    console.log('Backend save skipped');
                }
            }

            // Sync to Google Sheets
            syncToGoogleSheets(payload);
            setState({ view: 'preview' });
        }

        async function deleteReport(id, e) {
            if (e) e.stopPropagation();
            if (!confirm('Are you sure you want to delete this report?')) return;
            
            Storage.deleteReport(id);
            setState({ reports: Storage.getReports() });

            if (!isLocalFile) {
                try {
                    await fetch(`/api/reports/${id}`, { method: 'DELETE' });
                } catch (err) {
                    console.log('Backend delete skipped');
                }
            }
        }

        async function syncToGoogleSheets(report) {
            if (!GOOGLE_SCRIPT_URL) return;

            setState({ isSyncing: true });
            try {
                const payload = {
                    id: report.id,
                    date: report.display_date || report.displayDate,
                    platform: report.data.platform,
                    account: report.data.account,
                    postingTime: report.data.postingTime,
                    preparedFor: report.data.preparedFor,
                    preparedForRole: report.data.preparedForRole,
                    preparedBy: report.data.preparedBy,
                    preparedByRole: report.data.preparedByRole,
                    timingReason1: report.data.timingReason1,
                    timingReason2: report.data.timingReason2,
                    postingGoal: report.data.postingGoal,
                    additionalContributions: report.data.additionalContributions,
                    refImage: report.images.refImages?.[0] || null,
                    designImage: report.images.designImages?.[0] || null,
                    extraWorkImage: report.images.extraWorkImages?.[0] || null,
                };

                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                // Update sync status locally
                Storage.updateSyncStatus(report.id, true);
                setState({ reports: Storage.getReports() });

                if (!isLocalFile) {
                    // Try to update backend
                    try {
                        await fetch(`/api/reports/${report.id}/sync`, {
                            method: 'PATCH',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ synced: true })
                        });
                    } catch (e) {
                        console.log('Backend sync status update skipped');
                    }
                }
            } catch (err) {
                console.error('Sync failed:', err);
            } finally {
                setState({ isSyncing: false });
            }
        }

        async function syncAllReports() {
            const unsynced = state.reports.filter(r => !r.synced);
            if (unsynced.length === 0) {
                alert('All reports are already synced!');
                return;
            }
            
            setState({ isSyncing: true });
            for (const report of unsynced) {
                await syncToGoogleSheets(report);
            }
            alert(`Synced ${unsynced.length} reports!`);
            setState({ isSyncing: false });
        }

        async function downloadPDF() {
            const element = document.getElementById('report-content');
            if (!element) return;
            setState({ isGenerating: true });
            
            try {
                const canvas = await html2canvas(element, {
                    scale: 2,
                    useCORS: true,
                    allowTaint: true,
                    backgroundColor: '#ffffff',
                    logging: false
                });
                
                const imgData = canvas.toDataURL('image/jpeg', 0.9);
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF({
                    orientation: 'portrait',
                    unit: 'px',
                    format: [canvas.width, canvas.height]
                });
                
                pdf.addImage(imgData, 'JPEG', 0, 0, canvas.width, canvas.height);
                pdf.save(`Marketing_Report_${new Date().toISOString().split('T')[0]}.pdf`);
                
                const report = state.reports.find(r => r.id === state.currentReportId);
                if (report && !report.synced) syncToGoogleSheets(report);
            } catch (error) {
                console.error('Error generating PDF:', error);
                alert('There was an error generating the PDF. Please try again.');
            } finally {
                setState({ isGenerating: false });
            }
        }

        // View Rendering Functions
        function renderHome() {
            const reportsList = state.reports.length === 0 
                ? `<div class="bg-white rounded-3xl p-20 text-center border border-zinc-100 shadow-sm">
                        <div class="w-20 h-20 bg-zinc-50 rounded-full flex items-center justify-center mx-auto mb-6 text-zinc-300 p-6">
                            ${Icons.FileText}
                        </div>
                        <h3 class="text-xl font-bold text-zinc-900 mb-2">No reports yet</h3>
                        <p class="text-zinc-500 mb-8 max-w-sm mx-auto">Start by creating your first daily operation report to track team growth and marketing assets.</p>
                        <button onclick="startNewReport()" class="text-zinc-900 font-bold underline underline-offset-4 hover:text-zinc-600 transition-colors">
                            Create your first report
                        </button>
                    </div>`
                : `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    ${state.reports.map(report => `
                        <div onclick="previewReport('${report.id}')" class="group bg-white rounded-3xl p-6 border border-zinc-100 shadow-sm hover:shadow-xl transition-all cursor-pointer relative overflow-hidden">
                                <div class="absolute top-0 right-0 p-4 opacity-0 group-hover:opacity-100 transition-opacity">
                                    <button onclick="deleteReport('${report.id}', event)" class="p-2 bg-red-50 text-red-500 rounded-full hover:bg-red-100 transition-colors">
                                        <div class="w-4 h-4">${Icons.Trash2}</div>
                                    </button>
                                </div>
                                <div class="flex items-start justify-between mb-4">
                                    <div class="w-12 h-12 bg-zinc-900 rounded-2xl flex items-center justify-center text-white p-3">
                                        ${Icons.Calendar}
                                    </div>
                                    <span class="text-[10px] font-bold text-zinc-400 uppercase tracking-widest">${report.display_date || report.displayDate}</span>
                                </div>
                            <h3 class="text-lg font-bold text-zinc-900 mb-1 group-hover:text-emerald-600 transition-colors">Daily Operation Report</h3>
                            <p class="text-xs text-zinc-500 mb-6 line-clamp-2">${report.data.postingGoal}</p>
                            <div class="flex items-center justify-between pt-4 border-t border-zinc-50">
                                <div class="flex items-center gap-2">
                                    <div class="flex -space-x-2">
                                        ${report.images.refImages?.[0] ? `<div class="w-8 h-8 rounded-full border-2 border-white overflow-hidden bg-zinc-100"><img src="${report.images.refImages[0]}" class="w-full h-full object-cover"></div>` : ''}
                                        ${report.images.designImages?.[0] ? `<div class="w-8 h-8 rounded-full border-2 border-white overflow-hidden bg-zinc-100"><img src="${report.images.designImages[0]}" class="w-full h-full object-cover"></div>` : ''}
                                    </div>
                                    ${report.synced 
                                        ? `<div class="text-emerald-500 w-5 h-5">${Icons.CheckCircle2}</div>` 
                                        : `<button onclick="event.stopPropagation(); syncToGoogleSheetsById('${report.id}')" class="p-1.5 text-zinc-400 hover:text-emerald-600 hover:bg-emerald-50 rounded-full transition-all" title="Sync to Sheet">
                                            <div class="w-4 h-4 ${state.isSyncing ? 'animate-spin' : ''}">${Icons.RefreshCw}</div>
                                           </button>`
                                    }
                                </div>
                                <div class="flex items-center gap-2">
                                    <button onclick="event.stopPropagation(); editReport('${report.id}')" class="p-2 text-zinc-400 hover:text-zinc-900 transition-colors">
                                        <div class="w-4 h-4">${Icons.Edit3}</div>
                                    </button>
                                    <div class="text-zinc-300 group-hover:translate-x-1 transition-transform w-4 h-4">${Icons.ChevronRight}</div>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                   </div>`;

            return `
                <div class="max-w-6xl mx-auto">
                    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-6 mb-12">
                        <div>
                            <h1 class="text-3xl sm:text-4xl font-black text-zinc-900 tracking-tight uppercase italic">AIRA Intelligence</h1>
                            <p class="text-zinc-500 font-medium text-sm sm:text-base">Daily Marketing & Team Operation Reports</p>
                        </div>
                        <div class="flex items-center gap-3">
                            <button onclick="syncAllReports()" ${state.isSyncing ? 'disabled' : ''} class="inline-flex items-center justify-center px-6 py-3 bg-white border border-zinc-200 text-zinc-700 font-bold rounded-xl hover:bg-zinc-50 transition-all shadow-sm disabled:opacity-50">
                                <div class="w-5 h-5 mr-2 ${state.isSyncing ? 'animate-spin' : ''}">${Icons.RefreshCw}</div>
                                Sync All
                            </button>
                            <button onclick="startNewReport()" class="inline-flex items-center justify-center px-6 py-3 bg-zinc-900 text-white font-bold rounded-xl hover:bg-zinc-800 transition-all shadow-xl hover:scale-105 active:scale-95">
                                <div class="w-5 h-5 mr-2">${Icons.Plus}</div>
                                New Daily Report
                            </button>
                        </div>
                    </div>
                    ${reportsList}
                </div>
            `;
        }

        function renderEditor() {
            return `
                <div class="max-w-4xl mx-auto">
                    <div class="flex items-center justify-between mb-8 no-print">
                        <button onclick="setState({view: 'home'})" class="inline-flex items-center text-zinc-500 hover:text-zinc-900 transition-colors font-medium">
                            <div class="w-5 h-5 mr-1">${Icons.ChevronLeft}</div>
                            Back to Home
                        </button>
                        <div class="flex flex-wrap items-center gap-2 sm:gap-3">
                            <button onclick="syncCurrentReport()" ${state.isSyncing ? 'disabled' : ''} class="inline-flex items-center px-4 py-2 bg-white border border-zinc-200 text-zinc-700 text-sm font-medium rounded-lg hover:bg-zinc-50 transition-colors shadow-sm disabled:opacity-50">
                                <div class="w-4 h-4 mr-2 ${state.isSyncing ? 'animate-spin' : ''}">${Icons.RefreshCw}</div>
                                Sync Sheet
                            </button>
                            <button onclick="setState({view: 'preview'})" class="inline-flex items-center px-4 py-2 bg-white border border-zinc-200 text-zinc-700 text-sm font-medium rounded-lg hover:bg-zinc-50 transition-colors shadow-sm">
                                <div class="w-4 h-4 mr-2">${Icons.Eye}</div>
                                Preview
                            </button>
                            <button onclick="saveReport()" class="inline-flex items-center px-4 py-2 bg-emerald-600 text-white text-sm font-medium rounded-lg hover:bg-emerald-700 transition-colors shadow-sm">
                                <div class="w-4 h-4 mr-2">${Icons.Save}</div>
                                Save Report
                            </button>
                        </div>
                    </div>

                    <div class="bg-white rounded-3xl shadow-xl border border-zinc-100 overflow-hidden no-print">
                        <div class="bg-zinc-900 px-8 py-6 text-white flex items-center justify-between">
                            <h2 class="text-xl font-bold flex items-center gap-2">
                                <div class="w-5 h-5 text-emerald-400">${Icons.Edit3}</div>
                                Report Editor
                            </h2>
                            <span class="text-xs font-mono text-zinc-400 uppercase tracking-widest">Step 1: Fill Details</span>
                        </div>
                        
                        <div class="p-8 space-y-8">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div class="space-y-2">
                                    <label class="text-xs font-bold text-zinc-500 uppercase tracking-wider">Platform</label>
                                    <input type="text" oninput="updateFormData('platform', this.value)" value="${state.formData.platform}" class="w-full px-4 py-2 bg-zinc-50 border border-zinc-200 rounded-lg focus:ring-2 focus:ring-zinc-900 focus:border-transparent outline-none transition-all">
                                </div>
                                <div class="space-y-2">
                                    <label class="text-xs font-bold text-zinc-500 uppercase tracking-wider">Account Handle</label>
                                    <input type="text" oninput="updateFormData('account', this.value)" value="${state.formData.account}" class="w-full px-4 py-2 bg-zinc-50 border border-zinc-200 rounded-lg focus:ring-2 focus:ring-zinc-900 focus:border-transparent outline-none transition-all">
                                </div>
                                <div class="space-y-2">
                                    <label class="text-xs font-bold text-zinc-500 uppercase tracking-wider">Posting Time</label>
                                    <input type="text" oninput="updateFormData('postingTime', this.value)" value="${state.formData.postingTime}" class="w-full px-4 py-2 bg-zinc-50 border border-zinc-200 rounded-lg focus:ring-2 focus:ring-zinc-900 focus:border-transparent outline-none transition-all">
                                </div>
                                <div class="space-y-2">
                                    <label class="text-xs font-bold text-zinc-500 uppercase tracking-wider">Prepared For</label>
                                    <div class="flex gap-2">
                                        <input type="text" placeholder="Name" oninput="updateFormData('preparedFor', this.value)" value="${state.formData.preparedFor}" class="flex-1 px-4 py-2 bg-zinc-50 border border-zinc-200 rounded-lg focus:ring-2 focus:ring-zinc-900 focus:border-transparent outline-none transition-all">
                                        <input type="text" placeholder="Role" oninput="updateFormData('preparedForRole', this.value)" value="${state.formData.preparedForRole}" class="flex-1 px-4 py-2 bg-zinc-50 border border-zinc-200 rounded-lg focus:ring-2 focus:ring-zinc-900 focus:border-transparent outline-none transition-all">
                                    </div>
                                </div>
                            </div>

                            <div class="space-y-6 pt-6 border-t border-zinc-100">
                                <h3 class="text-sm font-bold text-zinc-900 uppercase tracking-widest">Strategy & Goals</h3>
                                <div class="space-y-4">
                                    <div class="space-y-2">
                                        <label class="text-xs font-bold text-zinc-500 uppercase tracking-wider">Why Posting at ${state.formData.postingTime}? (Point 1)</label>
                                        <textarea oninput="updateFormData('timingReason1', this.value)" rows="2" class="w-full px-4 py-2 bg-zinc-50 border border-zinc-200 rounded-lg focus:ring-2 focus:ring-zinc-900 focus:border-transparent outline-none transition-all resize-none">${state.formData.timingReason1}</textarea>
                                    </div>
                                    <div class="space-y-2">
                                        <label class="text-xs font-bold text-zinc-500 uppercase tracking-wider">Why Posting at ${state.formData.postingTime}? (Point 2)</label>
                                        <textarea oninput="updateFormData('timingReason2', this.value)" rows="2" class="w-full px-4 py-2 bg-zinc-50 border border-zinc-200 rounded-lg focus:ring-2 focus:ring-zinc-900 focus:border-transparent outline-none transition-all resize-none">${state.formData.timingReason2}</textarea>
                                    </div>
                                    <div class="space-y-2">
                                        <label class="text-xs font-bold text-zinc-500 uppercase tracking-wider">Why We Are Posting This AIRA Post?</label>
                                        <textarea oninput="updateFormData('postingGoal', this.value)" rows="2" class="w-full px-4 py-2 bg-zinc-50 border border-zinc-200 rounded-lg focus:ring-2 focus:ring-zinc-900 focus:border-transparent outline-none transition-all resize-none">${state.formData.postingGoal}</textarea>
                                    </div>
                                </div>
                            </div>

                            <div class="space-y-4 pt-6 border-t border-zinc-100">
                                <label class="text-xs font-bold text-zinc-500 uppercase tracking-wider">Additional Contributions (Paragraph)</label>
                                <textarea oninput="updateFormData('additionalContributions', this.value)" rows="4" class="w-full px-4 py-2 bg-zinc-50 border border-zinc-200 rounded-lg focus:ring-2 focus:ring-zinc-900 focus:border-transparent outline-none transition-all resize-none">${state.formData.additionalContributions}</textarea>
                            </div>

                            <div class="space-y-8 pt-6 border-t border-zinc-100">
                                ${renderImageUploadSection('Reference Images', 'refImages')}
                                ${renderImageUploadSection('Design Images', 'designImages')}
                                ${renderImageUploadSection('Extra Work Images', 'extraWorkImages')}
                            </div>

                            <div class="pt-8 flex justify-end gap-3">
                                <button onclick="setState({view: 'home'})" class="px-8 py-3 bg-zinc-100 text-zinc-600 font-bold rounded-xl hover:bg-zinc-200 transition-all">Cancel</button>
                                <button onclick="saveReport()" class="inline-flex items-center px-8 py-3 bg-zinc-900 text-white font-bold rounded-xl hover:bg-zinc-800 transition-all shadow-lg active:scale-95">
                                    <div class="w-5 h-5 mr-2">${Icons.Save}</div>
                                    Save & Preview
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderImageUploadSection(label, key) {
            const images = state[key];
            return `
                <div class="space-y-4">
                    <div class="flex items-center justify-between">
                        <h3 class="text-sm font-bold text-zinc-900 uppercase tracking-widest">${label}</h3>
                        <label class="cursor-pointer inline-flex items-center px-3 py-1.5 bg-zinc-900 text-white text-[10px] font-bold rounded-lg hover:bg-zinc-800 transition-all shadow-sm">
                            <div class="w-3 h-3 mr-1">${Icons.Plus}</div>
                            Add Image
                            <input type="file" class="hidden" accept="image/*" multiple onchange="handleImageUpload(event, '${key}')">
                        </label>
                    </div>
                    <div class="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-5 gap-4">
                        ${images.map((img, i) => `
                            <div class="aspect-square bg-zinc-50 border border-zinc-200 rounded-xl overflow-hidden relative group">
                                <img src="${img}" class="w-full h-full object-cover">
                                <button onclick="removeImage('${key}', ${i})" class="absolute top-2 right-2 p-1.5 bg-red-500 text-white rounded-full opacity-0 group-hover:opacity-100 transition-opacity shadow-lg">
                                    <div class="w-3 h-3">${Icons.X}</div>
                                </button>
                            </div>
                        `).join('')}
                        ${images.length === 0 ? `
                            <label class="aspect-square bg-zinc-50 border-2 border-dashed border-zinc-200 rounded-xl flex flex-col items-center justify-center cursor-pointer hover:bg-zinc-100 transition-colors group">
                                <div class="w-6 h-6 text-zinc-300 group-hover:scale-110 transition-transform">${Icons.Plus}</div>
                                <span class="text-[10px] text-zinc-400 mt-1">Add Image</span>
                                <input type="file" class="hidden" accept="image/*" multiple onchange="handleImageUpload(event, '${key}')">
                            </label>
                        ` : ''}
                    </div>
                </div>
            `;
        }

        function renderPreview() {
            const todayDate = new Date().toLocaleDateString('en-GB', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric'
            });

            return `
                <div class="max-w-4xl mx-auto">
                    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8 no-print">
                        <button onclick="setState({view: 'home'})" class="inline-flex items-center text-zinc-500 hover:text-zinc-900 transition-colors font-medium">
                            <div class="w-5 h-5 mr-1">${Icons.Home}</div>
                            Back to Home
                        </button>
                        <div class="flex flex-wrap items-center gap-2 sm:gap-3">
                            <button onclick="syncCurrentReport()" ${state.isSyncing ? 'disabled' : ''} class="inline-flex items-center px-4 py-2 bg-emerald-50 border border-emerald-100 text-emerald-700 text-sm font-medium rounded-lg hover:bg-emerald-100 transition-colors shadow-sm disabled:opacity-50">
                                <div class="w-4 h-4 mr-2 ${state.isSyncing ? 'animate-spin' : ''}">${Icons.RefreshCw}</div>
                                Sync to Sheet
                            </button>
                            <button onclick="setState({view: 'editor'})" class="inline-flex items-center px-4 py-2 border border-zinc-200 bg-white text-zinc-700 text-sm font-medium rounded-lg hover:bg-zinc-50 transition-colors shadow-sm">
                                <div class="w-4 h-4 mr-2">${Icons.Edit3}</div>
                                Edit
                            </button>
                            <button onclick="window.print()" class="inline-flex items-center px-4 py-2 border border-zinc-200 bg-white text-zinc-700 text-sm font-medium rounded-lg hover:bg-zinc-50 transition-colors shadow-sm">
                                <div class="w-4 h-4 mr-2">${Icons.Printer}</div>
                                Print
                            </button>
                            <button onclick="downloadPDF()" ${state.isGenerating ? 'disabled' : ''} class="inline-flex items-center px-4 py-2 bg-zinc-900 text-white text-sm font-medium rounded-lg hover:bg-zinc-800 transition-colors shadow-sm disabled:opacity-50 disabled:cursor-not-allowed">
                                ${state.isGenerating 
                                    ? `<div class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin mr-2"></div>` 
                                    : `<div class="w-4 h-4 mr-2">${Icons.Download}</div>`
                                }
                                Download PDF
                            </button>
                        </div>
                    </div>

                    <div id="report-content" class="bg-white report-shadow rounded-2xl overflow-hidden report-container">
                        <div class="bg-zinc-900 px-8 py-12 text-white">
                            <div class="relative z-10">
                                <h2 class="text-4xl font-bold tracking-tight mb-2 uppercase italic">Marketing & Team Operation Daily Report</h2>
                                <p class="text-zinc-400 text-lg">Date: ${todayDate}</p>
                            </div>
                        </div>

                        <div class="p-8 sm:p-12 space-y-12">
                            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 border-b border-zinc-100 pb-12">
                                <div class="space-y-1">
                                    <span class="text-[10px] font-bold text-zinc-400 uppercase tracking-wider flex items-center gap-1.5">
                                        <div class="w-3 h-3 text-zinc-400">${Icons.Instagram}</div> Platform
                                    </span>
                                    <p class="font-semibold text-zinc-900">${state.formData.platform}</p>
                                    <p class="text-xs text-zinc-500">${state.formData.account}</p>
                                </div>
                                <div class="space-y-1">
                                    <span class="text-[10px] font-bold text-zinc-400 uppercase tracking-wider flex items-center gap-1.5">
                                        <div class="w-3 h-3 text-zinc-400">${Icons.Clock}</div> Posting Time
                                    </span>
                                    <p class="font-semibold text-zinc-900">${state.formData.postingTime}</p>
                                </div>
                                <div class="space-y-1">
                                    <span class="text-[10px] font-bold text-zinc-400 uppercase tracking-wider flex items-center gap-1.5">
                                        <div class="w-3 h-3 text-zinc-400">${Icons.User}</div> Prepared For
                                    </span>
                                    <p class="font-semibold text-zinc-900">${state.formData.preparedFor}</p>
                                    <p class="text-xs text-zinc-500 italic">${state.formData.preparedForRole}</p>
                                </div>
                                <div class="space-y-1">
                                    <span class="text-[10px] font-bold text-zinc-400 uppercase tracking-wider flex items-center gap-1.5">
                                        <div class="w-3 h-3 text-zinc-400">${Icons.Briefcase}</div> Prepared By
                                    </span>
                                    <p class="font-semibold text-zinc-900">${state.formData.preparedBy}</p>
                                    <p class="text-xs text-zinc-500">${state.formData.preparedByRole}</p>
                                </div>
                            </div>

                            <div class="space-y-6">
                                <h3 class="text-xl font-bold text-zinc-900 border-l-4 border-zinc-900 pl-4">Why Posting at ${state.formData.postingTime}</h3>
                                <div class="space-y-4 text-zinc-700 leading-relaxed">
                                    <p>${state.formData.timingReason1}</p>
                                    <p>${state.formData.timingReason2}</p>
                                </div>
                            </div>

                            <div class="space-y-6">
                                <h3 class="text-xl font-bold text-zinc-900 border-l-4 border-zinc-900 pl-4">Why We Are Posting This AIRA Post</h3>
                                <div class="text-zinc-700 leading-relaxed">
                                    <p>${state.formData.postingGoal}</p>
                                </div>
                            </div>

                            <div class="space-y-12">
                                <div class="space-y-6">
                                    <h3 class="text-xl font-bold text-zinc-900 border-l-4 border-zinc-900 pl-4">Visual Launch Assets</h3>
                                    <div class="space-y-8">
                                        ${renderPreviewImages('Reference Images', state.refImages)}
                                        ${renderPreviewImages('Designed Images', state.designImages)}
                                    </div>
                                </div>
                                <div class="space-y-6">
                                    <h3 class="text-xl font-bold text-zinc-900 border-l-4 border-zinc-900 pl-4">Extra Work Done</h3>
                                    ${renderPreviewImages('', state.extraWorkImages, true)}
                                </div>
                            </div>

                            <div class="space-y-6 pt-12 border-t border-zinc-100">
                                <h3 class="text-xl font-bold text-zinc-900 border-l-4 border-zinc-900 pl-4">Additional Contributions</h3>
                                <div class="text-zinc-700 leading-relaxed">
                                    <p>${state.formData.additionalContributions}</p>
                                </div>
                            </div>

                            <div class="pt-12 flex items-center justify-between border-t border-zinc-100 opacity-30">
                                <span class="text-[10px] font-mono tracking-widest uppercase">AIRA Internal Document</span>
                                <span class="text-[10px] font-mono tracking-widest uppercase">${todayDate}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderPreviewImages(label, images, isExtra = false) {
            if (images.length === 0) {
                return `
                    <div class="space-y-4">
                        ${label ? `<span class="text-xs font-bold text-zinc-400 uppercase tracking-wider">${label}</span>` : ''}
                        <div class="bg-zinc-50 border-2 border-dashed border-zinc-200 rounded-xl p-8 text-center">
                            <div class="w-8 h-8 text-zinc-300 mx-auto mb-2">${Icons.ImageIcon}</div>
                            <p class="text-xs text-zinc-400">No images provided</p>
                        </div>
                    </div>
                `;
            }
            return `
                <div class="space-y-4">
                    ${label ? `<span class="text-xs font-bold text-zinc-400 uppercase tracking-wider">${label}</span>` : ''}
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        ${images.map((img, i) => `
                            <div class="bg-zinc-50 border border-zinc-100 rounded-xl overflow-hidden shadow-sm">
                                <img src="${img}" alt="Image ${i + 1}" class="w-full h-auto block" referrerPolicy="no-referrer">
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        // Event Handlers & Logic
        window.startNewReport = () => {
            setState({
                view: 'editor',
                currentReportId: crypto.randomUUID(),
                formData: { ...DEFAULT_DATA },
                refImages: [],
                designImages: [],
                extraWorkImages: []
            });
        };

        window.editReport = (id) => {
            const report = state.reports.find(r => r.id === id);
            if (report) {
                setState({
                    view: 'editor',
                    currentReportId: id,
                    formData: report.data,
                    refImages: report.images.refImages || [],
                    designImages: report.images.designImages || [],
                    extraWorkImages: report.images.extraWorkImages || []
                });
            }
        };

        window.previewReport = (id) => {
            const report = state.reports.find(r => r.id === id);
            if (report) {
                setState({
                    view: 'preview',
                    currentReportId: id,
                    formData: report.data,
                    refImages: report.images.refImages || [],
                    designImages: report.images.designImages || [],
                    extraWorkImages: report.images.extraWorkImages || []
                });
            }
        };

        window.updateFormData = (key, value) => {
            state.formData[key] = value;
            // No full render on every keystroke to avoid losing focus, 
            // but we need to update the state object.
        };

        window.handleImageUpload = (e, key) => {
            const files = e.target.files;
            if (files) {
                for (let i = 0; i < files.length; i++) {
                    const file = files[i];
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        state[key].push(reader.result);
                        render();
                    };
                    reader.readAsDataURL(file);
                }
            }
        };

        window.removeImage = (key, index) => {
            state[key].splice(index, 1);
            render();
        };

        window.syncToGoogleSheetsById = async (id) => {
            const report = state.reports.find(r => r.id === id);
            if (report) await syncToGoogleSheets(report);
        };

        window.syncCurrentReport = async () => {
            const report = state.reports.find(r => r.id === state.currentReportId);
            if (report) await syncToGoogleSheets(report);
            else alert('Please save the report first.');
        };

        // Main Render Function
        function render() {
            const app = document.getElementById('app');
            let content = '';
            
            if (state.view === 'home') content = renderHome();
            else if (state.view === 'editor') content = renderEditor();
            else if (state.view === 'preview') content = renderPreview();
            
            app.innerHTML = `
                <div class="min-h-screen p-4 sm:p-8 md:p-12 fade-in">
                    ${content}
                </div>
            `;
        }

        // Initial Load
        window.onload = () => {
            fetchReports();
            render();
        };
    </script>
</body>
</html>
