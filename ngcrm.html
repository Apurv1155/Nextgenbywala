<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SoloCRM</title>
    
    <!-- Dependencies (Using CDNs for functionality) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

    <!-- Config -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd',
                400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8',
              }
            },
            animation: { 'slide-up': 'slideUp 0.3s ease-out forwards', 'fade-in': 'fadeIn 0.3s ease-out forwards' },
            keyframes: {
              slideUp: { '0%': { transform: 'translateY(100%)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } },
              fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } }
            }
          }
        }
      }
    </script>

    <style>
      /* Hide Scrollbars */
      ::-webkit-scrollbar { display: none; }
      * { -ms-overflow-style: none; scrollbar-width: none; }
      
      body { 
          background-color: #f8fafc; 
          -webkit-tap-highlight-color: transparent; 
          overscroll-behavior-y: none; 
          font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      }

      /* SortableJS Classes */
      .sortable-ghost { opacity: 0.4; background: #eff6ff; border: 2px dashed #3b82f6; }
      
      /* Dragging visual feedback */
      .sortable-drag { 
          cursor: grabbing; 
          opacity: 1; 
          background: white; 
          transform: rotate(3deg) scale(1.02); 
          box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2) !important; 
          z-index: 9999 !important; 
      }
      
      /* Snap scrolling for Kanban */
      .snap-x-mandatory {
          scroll-snap-type: x mandatory;
      }
      .snap-center {
          scroll-snap-align: center;
          scroll-snap-stop: always; /* Ensure we stop exactly on a column */
      }

      /* Disable snap and smoothing during drag to allow JS auto-scroll */
      .no-snap {
          scroll-snap-type: none !important;
          scroll-behavior: auto !important;
      }
      
      .chat-bubble { animation: fadeIn 0.3s ease-out forwards; }
      
      .sync-spin { animation: spin 2s linear infinite; }
      @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-slate-900 selection:bg-blue-100 selection:text-blue-900">

    <div id="app" class="flex flex-col h-screen">
        
        <!-- Header -->
        <header class="h-20 md:h-24 bg-slate-50/90 backdrop-blur-md flex items-center justify-between px-4 md:px-8 shrink-0 z-10 sticky top-0 border-b border-transparent transition-all">
            <div class="flex items-center">
                <img src="./SoloCRM_files/Logo2.png" class="h-8 md:h-10 w-auto" alt="SoloCRM" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
                <span class="hidden text-2xl font-bold text-blue-600 flex items-center gap-2">
                    <i data-lucide="shield-check"></i> SoloCRM

            </div>
            
            <div class="flex items-center gap-4">
                <!-- Sync Button -->
                <button onclick="fetchLeadsFromSheets()" id="sync-btn" class="flex items-center gap-2 px-4 py-2 text-xs font-bold bg-white text-blue-600 border border-blue-100 rounded-lg hover:bg-blue-50 transition-all shadow-sm">
                    <i data-lucide="refresh-cw" id="sync-icon" class="w-4 h-4"></i>
                    <span class="hidden sm:inline">Refresh Data</span>
                </button>

                <!-- Desktop User Indicator -->
                <div class="hidden md:flex items-center gap-3 px-4 py-2 text-xs text-slate-400 bg-white/50 rounded-lg border border-slate-100">
                    <div class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></div>
                    System Online
                </div>
            </div>
        </header>

        <!-- Sidebar (Desktop) -->
        <aside class="hidden md:flex flex-col fixed left-0 top-24 bottom-0 w-64 bg-slate-50 border-r border-slate-200/50 p-4 z-20">
            <div class="space-y-1" id="desktop-nav">
                <!-- Nav items rendered by JS -->
            </div>
        </aside>

        <!-- Main Content -->
        <main id="main-content" class="flex-1 overflow-y-auto overflow-x-hidden relative scroll-smooth md:ml-64">

        </main>

        <!-- Bottom Navigation (Mobile) -->
        <nav class="md:hidden h-16 bg-white border-t border-slate-200 flex justify-around items-center shrink-0 pb-safe shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.02)] z-30" id="mobile-nav">

    <!-- LOGIC -->
    <script>
        const GAS_DEPLOY_URL = "https://script.google.com/macros/s/AKfycbzjKeEkR3vYkSlQfVD7iv739qsGlADUH8Bmjjhaa3DbfuD_sWhjckOPRlYaIjtMb24Z/exec";

        const LeadStatus = {
            NEW: 'New', CONTACTED: 'Contacted', FOLLOW_UP: 'Follow-Up', 
            INTERESTED: 'Interested', WON: 'Won', LOST: 'Lost'
        };
        const InteractionType = { CALL: 'Call', WHATSAPP: 'WhatsApp', EMAIL: 'Email', NOTE: 'Note' };
        
        const COLUMNS = [
            { id: LeadStatus.NEW, title: 'New' }, { id: LeadStatus.CONTACTED, title: 'Contacted' },
            { id: LeadStatus.FOLLOW_UP, title: 'Follow Up' }, { id: LeadStatus.INTERESTED, title: 'Interested' },
            { id: LeadStatus.WON, title: 'Won' }, { id: LeadStatus.LOST, title: 'Lost' }
        ];

        class Database {
            constructor() {
                this.KEYS = { LEADS: 'solocrm_leads', TASKS: 'solocrm_tasks', INTERACTIONS: 'solocrm_interactions', CLIENTS: 'solocrm_clients', CATEGORIES: 'solocrm_categories' };
                this.init();
            }
            init() {
                if (!localStorage.getItem(this.KEYS.LEADS)) {
                    localStorage.setItem(this.KEYS.LEADS, JSON.stringify([]));
                }
                if (!localStorage.getItem(this.KEYS.TASKS)) localStorage.setItem(this.KEYS.TASKS, JSON.stringify([]));
                if (!localStorage.getItem(this.KEYS.INTERACTIONS)) localStorage.setItem(this.KEYS.INTERACTIONS, JSON.stringify([]));
                if (!localStorage.getItem(this.KEYS.CLIENTS)) localStorage.setItem(this.KEYS.CLIENTS, JSON.stringify([]));
                if (!localStorage.getItem(this.KEYS.CATEGORIES)) {
                    const defaultCats = [
                        { id: 'Education', color: '#10b981' },
                        { id: 'Packaging', color: '#3b82f6' },
                        { id: 'Food Business', color: '#f59e0b' }
                    ];
                    localStorage.setItem(this.KEYS.CATEGORIES, JSON.stringify(defaultCats));
                }
            }
            load(key) { 
                try {
                    return JSON.parse(localStorage.getItem(key) || '[]'); 
                } catch(e) {
                    console.error("Storage load error", key, e);
                    return [];
                }
            }
            save(key, data) { localStorage.setItem(key, JSON.stringify(data)); }
            getLeads() { return this.load(this.KEYS.LEADS); }
            saveLeads(leads) { this.save(this.KEYS.LEADS, leads); }
            getTasks() { return this.load(this.KEYS.TASKS); }
            saveTasks(tasks) { this.save(this.KEYS.TASKS, tasks); }
            getInteractions() { return this.load(this.KEYS.INTERACTIONS); }
            getClients() { return this.load(this.KEYS.CLIENTS); }
            getCategories() { return this.load(this.KEYS.CATEGORIES); }
            saveCategories(cats) { this.save(this.KEYS.CATEGORIES, cats); }
            addCategory(cat) { 
                const cats = this.getCategories(); 
                if(!cats.find(c => c.id === cat.id)) {
                    cats.push(cat); 
                    this.saveCategories(cats); 
                }
            }
            addInteraction(interaction) {
                const ints = this.getInteractions(); ints.push(interaction); this.save(this.KEYS.INTERACTIONS, ints);
                const leads = this.getLeads(); const lead = leads.find(l => l.id === interaction.leadId);
                if (lead) { 
                    lead.lastInteraction = interaction.timestamp; 
                    this.saveLeads(leads); 
                    autoSync();
                }
            }
            addLead(lead) { 
                const leads = this.getLeads(); 
                leads.push(lead); 
                this.saveLeads(leads); 
                autoSync();
            }
            deleteLead(id) { 
                const leads = this.getLeads().filter(l => l.id !== id); 
                this.saveLeads(leads); 
                autoSync();
            }
            createClient(lead) {
                const clients = this.getClients(); if (clients.find(c => c.leadId === lead.id)) return;
                clients.push({ id: crypto.randomUUID(), leadId: lead.id, name: lead.name, serviceType: 'New Client', renewalDate: Date.now() + 30 * 24 * 3600 * 1000 });
                this.save(this.KEYS.CLIENTS, clients);
            }
        }
        const db = new Database();

        async function fetchLeadsFromSheets(silent = false) {
            if (!GAS_DEPLOY_URL || GAS_DEPLOY_URL.includes("PASTE_YOUR")) return;
            const icon = document.getElementById('sync-icon');
            if(icon && !silent) icon.classList.add('sync-spin');
            
            try {
                const response = await fetch(GAS_DEPLOY_URL, { 
                    method: 'GET',
                    redirect: 'follow'
                });
                
                const text = await response.text();
                
                // If it's HTML, GAS is likely asking for login or script is not "Anyone"
                if (text.trim().startsWith("<!DOCTYPE") || text.trim().startsWith("<html")) {
                    console.error("GAS returned HTML:", text.substring(0, 200));
                    throw new Error("Invalid Cloud Response: Please ensure the script is deployed as 'Web App', Execute as 'Me', and 'Who has access: Anyone'.");
                }

                try {
                    const data = JSON.parse(text);
                    if (data && Array.isArray(data)) {
                        db.saveLeads(data);
                        if (!silent) alert(`Synchronization Successful! Records found: ${data.length}`);
                        handleRoute(); 
                    } else if (data && data.error) {
                        throw new Error(data.error);
                    }
                } catch(pe) {
                    console.error("JSON Parse Error:", text);
                    throw new Error("Cloud script didn't return valid JSON. Check your Apps Script deployment.");
                }
            } catch (e) {
                console.error("Cloud Sync Error:", e);
                if (!silent) alert(e.message || "Failed to reach the cloud server.");
            } finally {
                if(icon && !silent) icon.classList.remove('sync-spin');
            }
        }

        let syncTimeout = null;
        function autoSync() {
            if (syncTimeout) clearTimeout(syncTimeout);
            syncTimeout = setTimeout(() => {
                syncLeadsToSheets(true);
            }, 3000); // 3 second delay to batch rapid changes
        }

        async function syncLeadsToSheets(silent = false) {
            if (!GAS_DEPLOY_URL || GAS_DEPLOY_URL.includes("PASTE_YOUR")) return;
            const icon = document.getElementById('sync-icon');
            if(icon && !silent) icon.classList.add('sync-spin');
            try {
                const leads = db.getLeads();
                const interactions = db.getInteractions();
                const data = leads.map(l => {
                    const leadInts = interactions.filter(i => i.leadId === l.id).sort((a,b) => b.timestamp - a.timestamp);
                    const lastNote = leadInts.find(i => i.type === 'Note')?.content || '';
                    const allNotes = leadInts.filter(i => i.type === 'Note').map(i => `${new Date(i.timestamp).toLocaleDateString()}: ${i.content}`).join(' | ');
                    
                    return { 
                        ...l, 
                        id: l.id,
                        interactionCount: leadInts.length,
                        lastNote: lastNote,
                        allNotes: allNotes
                    };
                });
                
                await fetch(GAS_DEPLOY_URL, { 
                    method: 'POST', 
                    mode: 'no-cors', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data) 
                });
                
                if (!silent) alert("Data pushed to cloud!");
            } catch (e) { 
                console.error(e); 
                if (!silent) alert("Sync Failed."); 
            }
            finally { if(icon && !silent) icon.classList.remove('sync-spin'); }
        }

        // Horizontal Scroll for Kanban (Mobile Auto-Slide)
        let isDraggingLead = false;
        let currentTouchX = 0;
        function checkAutoSlide() {
            if (!isDraggingLead) return;
            const board = document.getElementById('kanban-board');
            if (!board) return;
            
            const viewportWidth = window.innerWidth;
            const threshold = 85; // Wider threshold for better mobile edge detection
            let scrollAmount = 0;

            if (currentTouchX > (viewportWidth - threshold)) {
                scrollAmount = 12; // Faster scroll
            } else if (currentTouchX < threshold && currentTouchX > 0) {
                scrollAmount = -12;
            }

            if (scrollAmount !== 0) {
                board.scrollLeft += scrollAmount;
            }
            requestAnimationFrame(checkAutoSlide);
        }
        window.addEventListener('touchmove', (e) => {
            if (isDraggingLead && e.touches[0]) currentTouchX = e.touches[0].clientX;
        }, { passive: true });
        window.addEventListener('mousemove', (e) => {
            if (isDraggingLead) currentTouchX = e.clientX;
        });

        function renderNav() {
            try {
                const routes = [ { id: 'dashboard', icon: 'layout-dashboard', label: 'Dash' }, { id: 'leads', icon: 'users', label: 'Leads' }, { id: 'tasks', icon: 'check-square', label: 'Tasks' }, { id: 'clients', icon: 'briefcase', label: 'Clients' } ];
                const current = location.hash.replace('#', '') || 'dashboard';
                document.getElementById('desktop-nav').innerHTML = routes.map(r => `

        function quickNote(id) {
            const note = prompt("Enter a brief note for this lead:");
            if(note && note.trim()) {
                db.addInteraction({ id: crypto.randomUUID(), leadId: id, type: 'Note', content: note.trim(), timestamp: Date.now() });
                renderLeads();
            }
        }

        function initSortable() {
            try {
                if (typeof Sortable === 'undefined') return;
                document.querySelectorAll('.kanban-col').forEach(col => {
                    new Sortable(col, {
                        group: 'leads', animation: 200, handle: '.drag-handle', forceFallback: true,
                        onStart: (evt) => {
                            isDraggingLead = true;
                            const board = document.getElementById('kanban-board');
                            if(board) {
                                board.classList.add('no-snap');
                                board.style.scrollSnapType = 'none';
                            }
                            requestAnimationFrame(checkAutoSlide);
                        },
                        onEnd: (evt) => {
                            isDraggingLead = false;
                            const board = document.getElementById('kanban-board');
                            if(board) {
                                board.classList.remove('no-snap');
                                board.style.scrollSnapType = 'x mandatory';
                            }
                            const next = evt.to.dataset.status; const prev = evt.from.dataset.status; const id = evt.item.dataset.id;
                            if (next !== prev) {
                                const ls = db.getLeads(); const l = ls.find(x => x.id === id);
                                if(l) { 
                                    l.status = next; db.saveLeads(ls); 
                                    db.addInteraction({ id: crypto.randomUUID(), leadId: id, type: 'Note', content: `Moved ${prev} -> ${next}`, timestamp: Date.now() }); 
                                    if(next === LeadStatus.WON) db.createClient(l); 
                                    autoSync();
                                    renderLeads();
                                }
                            }
                        }
                    });
                });
            } catch(e) { console.error("Sortable init error", e); }
        }

        function handleFileUpload(input) {
            const reader = new FileReader(); reader.onload = (e) => {

                window.pData = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);

                    category: 'Imported',
                    status: LeadStatus.NEW, 
                    createdAt: Date.now() 
                });
            });
            db.saveLeads(leads);
            db.addCategory({ id: 'Imported', color: '#94a3b8' });
            autoSync();
            alert(`Imported ${window.pData.length} leads`); closeModal('add-modal'); handleRoute();
        }

        function addTask(e) { e.preventDefault(); const t = document.getElementById('task-in').value; if(!t) return; const ts = db.getTasks(); ts.push({ id: crypto.randomUUID(), title: t, isCompleted: false }); db.saveTasks(ts); renderTasks(); }
        function toggleTask(id) { const ts = db.getTasks(); const t = ts.find(x => x.id === id); if(t) t.isCompleted = !t.isCompleted; db.saveTasks(ts); renderTasks(); }

        function openLeadModal(id) {
            currentLeadId = id;
            renderLeadModalContent();
            document.getElementById('lead-modal').classList.remove('hidden');
        }

        function renderLeadModalContent() {
            try {
                const l = db.getLeads().find(x => x.id === currentLeadId); if(!l) return;
                const ints = db.getInteractions().filter(x => x.leadId === currentLeadId).sort((a,b) => b.timestamp - a.timestamp);
                const phoneStr = String(l.phone || '');
                const rawPhone = phoneStr.replace(/\D/g, '');
                const waPhone = rawPhone.length === 10 ? '91' + rawPhone : rawPhone;

                document.getElementById('lead-modal-content').innerHTML = `
                    <div class="text-center p-6 bg-slate-50 rounded-2xl mb-6 relative">
                        <button onclick="editLead('${l.id}')" class="absolute top-4 right-4 p-2 bg-white hover:bg-blue-50 text-slate-400 hover:text-blue-600 rounded-xl border border-slate-100 shadow-sm transition-all focus:ring-2 focus:ring-blue-100 outline-none" title="Edit Profile">
                            <i data-lucide="edit-3" class="w-4 h-4"></i>
                        </button>
                        <div class="w-20 h-20 bg-brand-500 text-white rounded-full flex items-center justify-center text-3xl font-bold mx-auto mb-4">${(l.name || 'U')[0]}</div>
                        <h2 class="text-2xl font-bold">${l.name || 'Unknown'}</h2>
                        <p class="text-slate-500 text-sm font-medium mb-4">${l.company || ''}</p>
                        <div class="flex gap-2">
                            <a href="tel:${phoneStr}" onclick="logAction('${l.id}', 'Call')" class="flex-1 py-2.5 bg-blue-600 text-white rounded-xl flex items-center justify-center gap-2 text-sm font-bold shadow-lg shadow-blue-100 active:scale-95 transition-all"><i data-lucide="phone" class="w-4 h-4"></i> Call</a>
                            <a href="https://wa.me/${waPhone}" onclick="logAction('${l.id}', 'WhatsApp')" target="_blank" class="flex-1 py-2.5 bg-emerald-500 text-white rounded-xl flex items-center justify-center gap-2 text-sm font-bold shadow-lg shadow-emerald-100 active:scale-95 transition-all"><i data-lucide="message-circle" class="w-4 h-4"></i> WA</a>
                            <a href="mailto:${l.email || ''}" onclick="logAction('${l.id}', 'Email')" class="flex-1 py-2.5 bg-slate-900 text-white rounded-xl flex items-center justify-center gap-2 text-sm font-bold shadow-lg active:scale-95 transition-all"><i data-lucide="mail" class="w-4 h-4"></i> Email</a>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-3 mb-6">
                        <div class="p-3 bg-slate-50 rounded-xl border border-slate-100">
                            <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Status</p>
                            <div class="flex items-center gap-2">
                                <div class="w-2 h-2 rounded-full bg-blue-500"></div>
                                <span class="text-xs font-bold text-slate-700">${l.status}</span>
                            </div>
                        </div>
                        <div class="p-3 bg-slate-50 rounded-xl border border-slate-100">
                            <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Category</p>
                            <span class="text-xs font-bold text-slate-700 truncate">${l.category || 'N/A'}</span>
                        </div>
                    </div>

                    <div class="mb-6">
                        <p class="text-xs font-bold text-slate-400 uppercase mb-2">New Note</p>
                        <div class="flex gap-2">
                            <input id="note-in" class="flex-1 px-4 py-3 bg-slate-50 border border-slate-100 rounded-xl outline-none focus:ring-2 focus:ring-blue-100 text-sm" placeholder="Add a note...">
                            <button onclick="addNote()" class="bg-blue-600 text-white px-4 rounded-xl shadow-md active:scale-90 transition-all"><i data-lucide="save" class="w-4 h-4"></i></button>
                        </div>
                    </div>

                    <div class="space-y-4">
                        <p class="text-xs font-bold text-slate-400 uppercase">Recent Activity</p>
                        <div class="space-y-3">
                            ${ints.map(i => `
                                <div class="p-3 bg-white border border-slate-100 rounded-xl shadow-sm text-sm">
                                    <div class="flex justify-between items-center mb-1">
                                        <span class="font-bold text-[10px] text-blue-500 uppercase">${i.type}</span>
                                        <span class="text-[9px] text-slate-400">${new Date(i.timestamp).toLocaleString()}</span>
                                    </div>
                                    <p class="text-slate-600 text-xs">${i.content}</p>
                                </div>
                            `).join('')}
                        </div>
                        ${!ints.length ? '<p class="text-slate-300 text-center text-sm italic">No history yet.</p>' : ''}
                    </div>`;
                if (typeof lucide !== 'undefined') lucide.createIcons();
            } catch(e) { console.error("Profile render error", e); }
        }

        function editLead(id) {
            const l = db.getLeads().find(x => x.id === id); if(!l) return;
            const cats = db.getCategories();
            
            document.getElementById('lead-modal-content').innerHTML = `
                <div class="space-y-6">
                    <div class="flex items-center gap-3 mb-6">
                        <button onclick="renderLeadModalContent()" class="p-2 bg-slate-100 rounded-lg hover:bg-slate-200 transition-all">
                            <i data-lucide="arrow-left" class="w-4 h-4 text-slate-600"></i>
                        </button>
                        <h3 class="font-bold text-lg">Edit Lead</h3>
                    </div>

                    <form onsubmit="handleLeadUpdate(event, '${l.id}')" class="space-y-4">
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Name</label>
                            <input name="name" value="${l.name || ''}" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-100 outline-none">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Company</label>
                            <input name="company" value="${l.company || ''}" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-100 outline-none">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Category</label>
                                <select name="category" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-100 outline-none appearance-none">
                                    ${cats.map(c => `<option value="${c.id}" ${l.category === c.id ? 'selected' : ''}>${c.id}</option>`).join('')}
                                </select>
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Status</label>
                                <select name="status" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-100 outline-none appearance-none">
                                    ${Object.values(LeadStatus).map(s => `<option value="${s}" ${l.status === s ? 'selected' : ''}>${s}</option>`).join('')}
                                </select>
                            </div>
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Phone</label>
                            <input name="phone" value="${l.phone || ''}" type="tel" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-100 outline-none">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Email</label>
                            <input name="email" value="${l.email || ''}" type="email" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-100 outline-none">
                        </div>
                        
                        <div class="pt-4 flex gap-3">
                            <button type="button" onclick="deleteLeadConfirm('${l.id}')" class="flex-1 py-4 bg-red-50 text-red-600 font-bold rounded-xl hover:bg-red-100 transition-all">Delete</button>
                            <button type="submit" class="flex-[2] py-4 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 shadow-lg shadow-blue-100 transition-all">Save Changes</button>
                        </div>
                    </form>
                </div>
            `;
            if (typeof lucide !== 'undefined') lucide.createIcons();
        }

        function handleLeadUpdate(e, id) {
            e.preventDefault();
            const fd = new FormData(e.target);
            const ls = db.getLeads();
            const idx = ls.findIndex(x => x.id === id);
            if(idx === -1) return;
            
            const oldStatus = ls[idx].status;
            const newStatus = fd.get('status');

            ls[idx] = { 
                ...ls[idx], 
                name: fd.get('name'), 
                company: fd.get('company'), 
                category: fd.get('category'), 
                status: newStatus,
                phone: fd.get('phone'),
                email: fd.get('email')
            };
            
            db.saveLeads(ls);
            if(oldStatus !== newStatus) {
                db.addInteraction({ id: crypto.randomUUID(), leadId: id, type: 'Note', content: `Status changed from ${oldStatus} to ${newStatus}`, timestamp: Date.now() });
                if(newStatus === LeadStatus.WON) db.createClient(ls[idx]);
            } else {
                db.addInteraction({ id: crypto.randomUUID(), leadId: id, type: 'Note', content: `Profile updated`, timestamp: Date.now() });
            }
            
            autoSync();
            renderLeadModalContent();
            renderLeads();
        }

        function deleteLeadConfirm(id) {
            if(confirm("Are you sure you want to delete this lead? This cannot be undone.")) {
                db.deleteLead(id);
                closeModal('lead-modal');
                renderLeads();
            }
        }

        let currentLeadId = null;
        function addNote() {
            const cin = document.getElementById('note-in');
            const val = cin.value.trim();
            if(!val || !currentLeadId) return;
            db.addInteraction({ id: crypto.randomUUID(), leadId: currentLeadId, type: 'Note', content: val, timestamp: Date.now() });
            cin.value = '';
            renderLeadModalContent();
        }

        function logAction(id, type) {
            db.addInteraction({ id: crypto.randomUUID(), leadId: id, type: type, content: `Logged ${type} action`, timestamp: Date.now() });
            if(id === currentLeadId) renderLeadModalContent();
        }

        function addAgentMsg(t, u=false) {
            document.getElementById('agent-chat-area').insertAdjacentHTML('beforeend', `<div class="flex ${u?'justify-end':'justify-start'} animate-fade-in"><div class="max-w-[85%] p-3 rounded-2xl text-sm ${u?'bg-blue-600 text-white':'bg-white text-slate-700 shadow-sm border'}">${t}</div></div>`);
            document.getElementById('agent-chat-area').scrollTop = 9999;
        }
        function resetAgentOptions() {
            const opts = [
                {id:'sum', label:'Status Summary'}, 
                {id:'new', label:'Show New'}, 
                {id:'sync', label:'Cloud Refresh'},
                {id:'over', label:'Overdue Tasks'}
            ];
            document.getElementById('agent-options').innerHTML = opts.map(o => `<button onclick="handleAgentQuery('${o.id}','${o.label}')" class="px-3 py-1.5 bg-slate-50 border border-slate-200 hover:bg-slate-100 rounded-full text-[11px] font-bold transition-transform active:scale-95">${o.label}</button>`).join('');
        }
        function handleAgentQuery(id, label) {
            addAgentMsg(label, true);
            setTimeout(() => {
                let r = "I'm checking on that for you...";
                if(id === 'sum') {
                    const leads = db.getLeads();
                    r = `You currently have ${leads.length} total leads in your pipeline.`;
                }
                else if(id === 'new') {
                    const count = db.getLeads().filter(x=>x.status===LeadStatus.NEW).length;
                    r = `There are ${count} leads in 'New' status waiting for contact.`;
                }
                else if(id === 'sync') {
                    r = "Initiating cloud pull... I'll update the list as soon as data arrives.";
                    fetchLeadsFromSheets(false);
                }
                else if(id === 'over') {
                    const overdue = db.getTasks().filter(t => !t.isCompleted && new Date(t.dueDate) < new Date());
                    r = overdue.length ? `You have ${overdue.length} overdue tasks that need attention.` : "No overdue tasks! You're all caught up.";
                }
                addAgentMsg(r);
            }, 600);
        }
        resetAgentOptions();
    </script>
</body>
</html>
