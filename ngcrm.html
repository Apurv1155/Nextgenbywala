<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SoloCRM</title>
    
    <!-- Dependencies (Using CDNs for functionality) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

    <!-- Config -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd',
                400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8',
              }
            },
            animation: { 'slide-up': 'slideUp 0.3s ease-out forwards', 'fade-in': 'fadeIn 0.3s ease-out forwards' },
            keyframes: {
              slideUp: { '0%': { transform: 'translateY(100%)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } },
              fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } }
            }
          }
        }
      }
    </script>

    <style>
      /* Hide Scrollbars */
      ::-webkit-scrollbar { display: none; }
      * { -ms-overflow-style: none; scrollbar-width: none; }
      
      body { 
          background-color: #f8fafc; 
          -webkit-tap-highlight-color: transparent; 
          overscroll-behavior-y: none; 
          font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      }

      /* SortableJS Classes */
      .sortable-ghost { opacity: 0.4; background: #eff6ff; border: 2px dashed #3b82f6; }
      
      /* Dragging visual feedback */
      .sortable-drag { 
          cursor: grabbing; 
          opacity: 1; 
          background: white; 
          transform: rotate(3deg) scale(1.02); 
          box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2) !important; 
          z-index: 9999 !important; 
      }
      
      /* Snap scrolling for Kanban */
      .snap-x-mandatory {
          scroll-snap-type: x mandatory;
      }
      .snap-center {
          scroll-snap-align: center;
          scroll-snap-stop: always; /* Ensure we stop exactly on a column */
      }

      /* Disable snap and smoothing during drag to allow JS auto-scroll */
      .no-snap {
          scroll-snap-type: none !important;
          scroll-behavior: auto !important;
      }
      
      .chat-bubble { animation: fadeIn 0.3s ease-out forwards; }
      
      .sync-spin { animation: spin 2s linear infinite; }
      @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-slate-900 selection:bg-blue-100 selection:text-blue-900">

    <div id="app" class="flex flex-col h-screen">
        
        <!-- Header -->
        <header class="h-20 md:h-24 bg-slate-50/90 backdrop-blur-md flex items-center justify-between px-4 md:px-8 shrink-0 z-10 sticky top-0 border-b border-slate-100 transition-all">
            <div class="flex items-center">
                <img src="Logo2.png" class="h-auto max-h-[45px] md:max-h-[60px] w-auto" alt="NextGee">
            </div>
            
            <div class="flex items-center gap-3 md:gap-4">
                <!-- Sync Button -->
                <button onclick="fetchLeadsFromSheets()" id="sync-btn" class="flex items-center gap-2 px-3 py-2 text-xs font-bold bg-white text-blue-600 border border-blue-100 rounded-lg hover:bg-blue-50 transition-all shadow-sm">
                    <i data-lucide="refresh-cw" id="sync-icon" class="w-4 h-4"></i>
                    <span class="hidden sm:inline">Refresh Data</span>
                </button>
                <button onclick="toggleMenu()" class="p-2 hover:bg-slate-100 rounded-xl transition-all active:scale-90 flex md:hidden">
                    <i data-lucide="menu" class="w-6 h-6 text-slate-700"></i>
                </button>
            </div>
        </header>

        <!-- Sidebar (Desktop) -->
        <aside class="hidden md:flex flex-col fixed left-0 top-24 bottom-0 w-64 bg-slate-50 border-r border-slate-200/50 p-4 z-20">
            <div class="space-y-1" id="desktop-nav">
                <!-- Nav items rendered by JS -->
            </div>
        </aside>

        <!-- Main Content -->
        <main id="main-content" class="flex-1 overflow-y-auto overflow-x-hidden relative scroll-smooth md:ml-64">
            <!-- Content rendered by JS -->
        </main>

        <!-- Bottom Navigation (Mobile) -->
        <nav class="md:hidden h-16 bg-white border-t border-slate-200 flex justify-around items-center shrink-0 pb-safe shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.02)] z-30" id="mobile-nav">
            <!-- Nav items rendered by JS -->
        </nav>

        <!-- Drawer Menu (Mobile & More) -->
        <div id="side-menu" class="fixed inset-0 z-[60] hidden overflow-hidden pointer-events-none">
            <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm pointer-events-auto transition-opacity duration-300 opacity-0" id="menu-overlay" onclick="toggleMenu()"></div>
            <div class="absolute top-0 right-0 h-full w-72 bg-white shadow-2xl pointer-events-auto transform translate-x-full transition-transform duration-300 ease-in-out flex flex-col" id="menu-content">
                <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/30">
                    <div>
                        <h3 class="font-black text-xl text-slate-800 tracking-tight">Menu</h3>
                        <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-0.5">Control Panel</p>
                    </div>
                    <button onclick="toggleMenu()" class="p-2 hover:bg-red-50 text-slate-400 hover:text-red-500 rounded-full transition-all active:scale-95"><i data-lucide="x" class="w-5 h-5"></i></button>
                </div>
                <div class="flex-1 py-6 px-4 space-y-6 overflow-y-auto" id="side-menu-items">
                    <!-- Items injected by JS -->
                </div>
                <div class="p-8 border-t border-slate-50 bg-slate-50/50 text-center">
                    <p class="text-[9px] font-black text-slate-300 uppercase tracking-[0.3em]">Powered by NextGen</p>
                </div>
            </div>
        </div>

    </div>

    <!-- Agent Floating Button -->
    <button onclick="openAgentModal()" class="fixed bottom-24 md:bottom-10 left-4 md:left-[280px] bg-slate-900 text-white p-3 rounded-full shadow-xl hover:bg-slate-800 transition-transform active:scale-95 z-40 flex items-center justify-center group">
        <i data-lucide="message-square" class="w-6 h-6"></i>
    </button>

    <!-- MODALS -->

    <!-- Agent Modal -->
    <div id="agent-modal" class="hidden fixed inset-0 z-50 flex items-end md:items-center justify-center">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm transition-opacity" onclick="closeModal('agent-modal')"></div>
        <div class="relative bg-white w-full md:max-w-md md:rounded-2xl rounded-t-3xl shadow-2xl flex flex-col animate-slide-up h-[80vh] md:h-[70vh]">
            <div class="flex items-center justify-between px-6 py-4 border-b border-gray-50 bg-slate-50 rounded-t-3xl md:rounded-t-2xl">
                <div class="flex items-center gap-3">
                    <img src="jerry.jpeg" class="w-10 h-10 rounded-full object-cover border-2 border-white shadow-sm" alt="Jerry">
                    <div>
                        <h2 class="text-lg font-bold text-gray-800">Jerry</h2>
                        <div class="flex items-center gap-1.5">
                            <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                            <span class="text-[10px] text-slate-500 font-medium uppercase tracking-wider">Online</span>
                        </div>
                    </div>
                </div>
                <button onclick="closeModal('agent-modal')" class="p-1.5 bg-white hover:bg-red-50 text-gray-500 hover:text-red-600 rounded-full border border-gray-100">
                    <i data-lucide="x" class="w-4 h-4"></i>
                </button>
            </div>
            
            <div class="flex-1 overflow-y-auto p-4 space-y-4 bg-slate-50/50" id="agent-chat-area"></div>

            <div class="p-4 bg-white border-t border-gray-100 pb-safe">
                <div class="flex items-center justify-between mb-3">
                    <p class="text-xs font-bold text-slate-400 uppercase tracking-wider">Suggested Actions:</p>
                    <button onclick="resetAgentOptions()" class="text-[10px] text-blue-600 font-bold hover:underline">Main Menu</button>
                </div>
                <div class="flex flex-wrap gap-2" id="agent-options"></div>
            </div>
        </div>
    </div>

    <!-- Lead Details Modal -->
    <div id="lead-modal" class="fixed inset-0 z-50 flex items-end md:items-center justify-center hidden">
        <div class="absolute inset-0 bg-slate-900/20 backdrop-blur-sm transition-opacity" onclick="closeModal('lead-modal')"></div>
        <div class="relative bg-white w-full md:max-w-lg md:rounded-2xl rounded-t-3xl shadow-2xl flex flex-col animate-slide-up h-[92vh] md:h-auto md:max-h-[85vh]">
            <div class="md:hidden w-full flex justify-center pt-3 pb-1" onclick="closeModal('lead-modal')">
                <div class="w-12 h-1.5 bg-gray-200 rounded-full"></div>
            </div>
            <div class="flex items-center justify-between px-6 py-4 border-b border-gray-50">
                <h2 class="text-xl font-bold text-gray-800 tracking-tight">Lead Profile</h2>
                <button onclick="closeModal('lead-modal')" class="p-2 bg-gray-50 hover:bg-blue-50 text-gray-500 hover:text-blue-600 rounded-full transition-colors">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <div class="overflow-y-auto p-6 flex-1 bg-white" id="lead-modal-content"></div>
        </div>
    </div>

    <!-- Add Lead Modal -->
    <div id="add-modal" class="hidden fixed inset-0 z-50 flex items-end md:items-center justify-center">
        <div class="absolute inset-0 bg-slate-900/20 backdrop-blur-sm transition-opacity" onclick="closeModal('add-modal')"></div>
        <div class="relative bg-white w-full md:max-w-lg md:rounded-2xl rounded-t-3xl shadow-2xl flex flex-col animate-slide-up h-auto pb-6">
            <div class="flex items-center justify-between px-6 py-4 border-b border-gray-50">
                <h2 class="text-xl font-bold text-gray-800">New Lead</h2>
                <button onclick="closeModal('add-modal')" class="p-2 bg-gray-50 hover:bg-red-50 text-gray-500 hover:text-red-600 rounded-full">
                    <i data-lucide="x"></i>
                </button>
            </div>
            
            <div class="flex border-b border-gray-100 px-6">
                <button id="tab-manual" class="flex-1 py-4 text-sm font-bold text-blue-600 border-b-2 border-blue-600 transition-colors" onclick="switchTab('manual')">Manual Entry</button>
                <button id="tab-import" class="flex-1 py-4 text-sm font-bold text-slate-400 border-b-2 border-transparent hover:text-slate-600 transition-colors" onclick="switchTab('import')">Import Excel</button>
            </div>

            <div class="p-6">
                <!-- Manual Form -->
                <form id="add-lead-form" class="space-y-4">
                    <div class="relative">
                        <i data-lucide="user" class="absolute left-3 top-3.5 text-slate-400 w-4 h-4"></i>
                        <input name="name" required class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-10 pr-4 py-3 focus:ring-2 focus:ring-blue-100 outline-none" placeholder="Full Name">
                    </div>
                    <div class="relative">
                        <i data-lucide="briefcase" class="absolute left-3 top-3.5 text-slate-400 w-4 h-4"></i>
                        <input name="company" class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-10 pr-4 py-3 focus:ring-2 focus:ring-blue-100 outline-none" placeholder="Company Name">
                    </div>
                    <div class="flex gap-2">
                        <div class="relative flex-1">
                            <i data-lucide="tag" class="absolute left-3 top-3.5 text-slate-400 w-4 h-4"></i>
                            <select name="category" id="cat-select" required class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-10 pr-10 py-3 focus:ring-2 focus:ring-blue-100 outline-none appearance-none">
                                <!-- Categories populated by JS -->
                            </select>
                            <i data-lucide="chevron-down" class="absolute right-3 top-3.5 text-slate-400 w-4 h-4 pointer-events-none"></i>
                        </div>
                        <button type="button" onclick="toggleNewCat()" class="bg-indigo-50 p-3 rounded-xl text-indigo-600 hover:bg-indigo-100 transition-all flex items-center justify-center shrink-0">
                            <i data-lucide="plus" class="w-5 h-5"></i>
                        </button>
                    </div>

                    <!-- New Category Input (Hidden by default) -->
                    <div id="new-cat-area" class="hidden animate-fade-in p-4 bg-slate-50 rounded-2xl border border-slate-100 space-y-3 mx-2">
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest px-1">Create Tag</p>
                        <div class="flex gap-2 items-center">
                            <input id="new-cat-name" class="flex-1 px-4 py-3 border border-slate-200 rounded-xl outline-none text-sm font-medium" placeholder="Tag Name">
                            <input id="new-cat-color" type="color" class="w-12 h-12 p-1 bg-white border border-slate-200 rounded-xl cursor-pointer shrink-0" value="#6366f1">
                        </div>
                        <button type="button" onclick="saveNewCat()" class="w-full bg-indigo-600 text-white text-sm font-black py-3 rounded-xl uppercase tracking-widest shadow-md active:scale-95 transition-all">Add Tag</button>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="relative">
                            <i data-lucide="phone" class="absolute left-3 top-3.5 text-slate-400 w-4 h-4"></i>
                            <input name="phone" type="tel" class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-10 pr-4 py-3 focus:ring-2 focus:ring-blue-100 outline-none" placeholder="Phone">
                        </div>
                        <div class="relative">
                            <i data-lucide="mail" class="absolute left-3 top-3.5 text-slate-400 w-4 h-4"></i>
                            <input name="email" type="email" class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-10 pr-4 py-3 focus:ring-2 focus:ring-blue-100 outline-none" placeholder="Email">
                        </div>
                    </div>
                    <button type="submit" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 mt-2 shadow-lg shadow-blue-200 flex justify-center items-center gap-2 transition-all">
                        <i data-lucide="user-plus" class="w-5 h-5"></i> Create Lead
                    </button>
                </form>

                <div id="import-form" class="hidden space-y-5 animate-fade-in">
                    <div class="border-2 border-dashed border-blue-200 rounded-2xl p-8 text-center bg-blue-50/50 relative group transition-colors hover:bg-blue-50">
                        <input type="file" id="excel-upload" accept=".xlsx, .xls, .csv" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" onchange="handleFileUpload(this)">
                        <div class="pointer-events-none">
                            <div class="bg-white w-16 h-16 rounded-full shadow-sm flex items-center justify-center mx-auto mb-4 group-hover:scale-110 transition-transform">
                                <i data-lucide="upload-cloud" class="w-8 h-8 text-blue-500"></i>
                            </div>
                            <p class="text-base font-bold text-slate-800">Click to Upload Excel</p>
                            <p class="text-xs text-slate-500 mt-2">Supports .xlsx, .xls, .csv</p>
                        </div>
                    </div>
                    
                    <div id="import-preview" class="hidden bg-white border border-slate-200 rounded-xl p-4 shadow-sm">
                        <div class="flex justify-between items-center mb-4">
                            <div class="flex items-center gap-3">
                                <div class="bg-emerald-100 text-emerald-600 p-2 rounded-lg">
                                    <i data-lucide="file-spreadsheet"></i>
                                </div>
                                <div>
                                    <p class="font-bold text-slate-800 text-sm">File Ready</p>
                                    <p class="text-xs text-slate-500">Found <span id="import-count" class="font-bold text-emerald-600">0</span> leads</p>
                                </div>
                            </div>
                        </div>
                        <button onclick="confirmImport()" class="w-full bg-emerald-500 text-white font-bold py-3 rounded-xl hover:bg-emerald-600 shadow-lg shadow-emerald-200 flex items-center justify-center gap-2 transition-transform active:scale-95">
                            <i data-lucide="check-circle" class="w-5 h-5"></i> Import Leads
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- LOGIC -->
    <script>
        const GAS_DEPLOY_URL = "https://script.google.com/macros/s/AKfycbzuk164suIQbqw3nMgLlHW_N6Us6zcGMkohoMry-NK8QcpLEmnFvjvFhFy4IchzAxAX/exec";

        const LeadStatus = {
            NEW: 'New', CONTACTED: 'Contacted', FOLLOW_UP: 'Follow-Up', 
            INTERESTED: 'Interested', WON: 'Won', LOST: 'Lost'
        };
        const InteractionType = { CALL: 'Call', WHATSAPP: 'WhatsApp', EMAIL: 'Email', NOTE: 'Note' };
        
        const COLUMNS = [
            { id: LeadStatus.NEW, title: 'New' }, { id: LeadStatus.CONTACTED, title: 'Contacted' },
            { id: LeadStatus.FOLLOW_UP, title: 'Follow Up' }, { id: LeadStatus.INTERESTED, title: 'Interested' },
            { id: LeadStatus.WON, title: 'Won' }, { id: LeadStatus.LOST, title: 'Lost' }
        ];

        class Database {
            constructor() {
                this.KEYS = { 
                    LEADS: 'solocrm_leads', 
                    TASKS: 'solocrm_tasks', 
                    INTERACTIONS: 'solocrm_interactions', 
                    CLIENTS: 'solocrm_clients', 
                    CATEGORIES: 'solocrm_categories',
                    FOLLOWUPS: 'solocrm_followups',
                    TEMPLATES: 'solocrm_templates'
                };
                this.init();
            }
            init() {
                if (!localStorage.getItem(this.KEYS.LEADS)) localStorage.setItem(this.KEYS.LEADS, JSON.stringify([]));
                if (!localStorage.getItem(this.KEYS.TASKS)) localStorage.setItem(this.KEYS.TASKS, JSON.stringify([]));
                if (!localStorage.getItem(this.KEYS.INTERACTIONS)) localStorage.setItem(this.KEYS.INTERACTIONS, JSON.stringify([]));
                if (!localStorage.getItem(this.KEYS.CLIENTS)) localStorage.setItem(this.KEYS.CLIENTS, JSON.stringify([]));
                if (!localStorage.getItem(this.KEYS.FOLLOWUPS)) localStorage.setItem(this.KEYS.FOLLOWUPS, JSON.stringify([]));
                
                if (!localStorage.getItem(this.KEYS.TEMPLATES)) {
                    const defaultTemplates = [
                        { id: 'bday', name: 'Birthday Wish', content: 'Happy Birthday {client}! Hope you have a fantastic day ahead.' },
                        { id: 'fu-2m', name: '2 Month Follow-up', content: 'Hi {client}, it has been 2 months since our project for {company} finished. Just wanted to check if everything is running smoothly!' },
                        { id: 'anni', name: 'Anniversary Message', content: 'Happy 1 Year Anniversary {client}! It has been exactly one year since we completed your project. Thank you for your continued trust.' }
                    ];
                    localStorage.setItem(this.KEYS.TEMPLATES, JSON.stringify(defaultTemplates));
                }

                if (!localStorage.getItem(this.KEYS.CATEGORIES)) {
                    const defaultCats = [
                        { id: 'Education', color: '#10b981' },
                        { id: 'Packaging', color: '#3b82f6' },
                        { id: 'Food Business', color: '#f59e0b' }
                    ];
                    localStorage.setItem(this.KEYS.CATEGORIES, JSON.stringify(defaultCats));
                } else {
                    // Cleanup unwanted categories if they exist (Inbound, Outbound, Referral)
                    let cats = this.load(this.KEYS.CATEGORIES);
                    const unwanted = ['Inbound', 'Outbound', 'Referral'];
                    const filtered = cats.filter(c => !unwanted.includes(c.id));
                    if (filtered.length !== cats.length) {
                        // If we removed something, ensure the 3 required ones exist
                        const required = [
                            { id: 'Education', color: '#10b981' },
                            { id: 'Packaging', color: '#3b82f6' },
                            { id: 'Food Business', color: '#f59e0b' }
                        ];
                        required.forEach(r => {
                            if (!filtered.find(f => f.id === r.id)) filtered.push(r);
                        });
                        this.saveCategories(filtered);
                    }
                }
            }
            load(key) { 
                try {
                    return JSON.parse(localStorage.getItem(key) || '[]'); 
                } catch(e) {
                    console.error("Storage load error", key, e);
                    return [];
                }
            }
            save(key, data) { localStorage.setItem(key, JSON.stringify(data)); }
            getLeads() { return this.load(this.KEYS.LEADS); }
            saveLeads(leads) { this.save(this.KEYS.LEADS, leads); }
            getTasks() { return this.load(this.KEYS.TASKS); }
            saveTasks(tasks) { this.save(this.KEYS.TASKS, tasks); }
            getInteractions() { return this.load(this.KEYS.INTERACTIONS); }
            getClients() { return this.load(this.KEYS.CLIENTS); }
            getFollowUps() { return this.load(this.KEYS.FOLLOWUPS); }
            getTemplates() { return this.load(this.KEYS.TEMPLATES); }
            getCategories() { return this.load(this.KEYS.CATEGORIES); }
            saveCategories(cats) { this.save(this.KEYS.CATEGORIES, cats); }
            saveFollowUps(data) { this.save(this.KEYS.FOLLOWUPS, data); }
            saveTemplates(data) { this.save(this.KEYS.TEMPLATES, data); }
            addCategory(cat) { 
                const cats = this.getCategories(); 
                if(!cats.find(c => c.id === cat.id)) {
                    cats.push(cat); 
                    this.saveCategories(cats); 
                }
            }
            addInteraction(interaction) {
                const ints = this.getInteractions(); ints.push(interaction); this.save(this.KEYS.INTERACTIONS, ints);
                const leads = this.getLeads(); const lead = leads.find(l => l.id === interaction.leadId);
                if (lead) { 
                    lead.lastInteraction = interaction.timestamp; 
                    this.saveLeads(leads); 
                    autoSync();
                }
            }
            addLead(lead) { 
                const leads = this.getLeads(); 
                leads.push(lead); 
                this.saveLeads(leads); 
                autoSync();
            }
            deleteLead(id) { 
                const leads = this.getLeads().filter(l => l.id !== id); 
                this.saveLeads(leads); 
                autoSync();
            }
            createClient(lead) {
                const clients = this.load(this.KEYS.CLIENTS); 
                if (clients.find(c => c.leadId === lead.id)) return;
                
                const client = { 
                    ...lead, // Copy all lead data (full row copy)
                    id: lead.id, // Match the ID
                    stages: [
                        { name: "Question Stage", date: "", completed: false },
                        { name: "Requirement Gathering Stage", date: "", completed: false },
                        { name: "Development Stage", date: "", completed: false },
                        { name: "Delivery Stage", date: "", completed: false },
                        { name: "Payment & Activation Stage", date: "", completed: false },
                        { name: "Aftercare & Retention Stage", date: "", completed: false }
                    ],
                    crmStatus: 'Active',
                    convertedAt: Date.now()
                };
                clients.push(client);
                this.save(this.KEYS.CLIENTS, clients);
                autoSync();
            }
        }
        const db = new Database();

        async function fetchLeadsFromSheets(silent = false) {
            if (!GAS_DEPLOY_URL || GAS_DEPLOY_URL.includes("PASTE_YOUR")) return;
            const icon = document.getElementById('sync-icon');
            if(icon && !silent) icon.classList.add('sync-spin');
            
            try {
                // 1. Sync Leads
                const leadRes = await fetch(GAS_DEPLOY_URL + "?sheet=Leads");
                const leads = JSON.parse(await leadRes.text());
                if (Array.isArray(leads)) db.saveLeads(leads);

                // 2. Sync CRM (Clients)
                const clientRes = await fetch(GAS_DEPLOY_URL + "?sheet=CRM");
                const cloudClients = JSON.parse(await clientRes.text());
                if (Array.isArray(cloudClients)) {
                    const restoredClients = cloudClients.map(unflattenClient);
                    db.save(db.KEYS.CLIENTS, restoredClients);
                }

                // 3. Sync FollowUps (Optional/Internal)
                try {
                    const fuRes = await fetch(GAS_DEPLOY_URL + "?sheet=FollowUps");
                    const fus = JSON.parse(await fuRes.text());
                    if (Array.isArray(fus)) db.saveFollowUps(fus);
                } catch(e) {}

                // 4. Sync Templates (Optional/Internal)
                try {
                    const tRes = await fetch(GAS_DEPLOY_URL + "?sheet=Templates");
                    const ts = JSON.parse(await tRes.text());
                    if (Array.isArray(ts)) db.saveTemplates(ts);
                } catch(e) {}

                if (!silent) alert(`Sync Successful!`);
                handleRoute(); 
            } catch (e) {
                console.error("Cloud Sync Error:", e);
                if (!silent) alert("Sync partially completed or failed. Check connection.");
            } finally {
                if(icon && !silent) icon.classList.remove('sync-spin');
            }
        }

        function unflattenClient(c) {
            const stages = [];
            for (let i = 1; i <= 6; i++) {
                if (c[`stage_${i}_name`]) {
                    stages.push({
                        name: c[`stage_${i}_name`],
                        date: c[`stage_${i}_date`] || "",
                        completed: String(c[`stage_${i}_completed`]).toLowerCase() === 'true'
                    });
                }
            }
            if (stages.length === 0) {
                // Default stages fallback
                return { ...c, stages: [
                    { name: "Question Stage", date: "", completed: false },
                    { name: "Requirement Gathering Stage", date: "", completed: false },
                    { name: "Development Stage", date: "", completed: false },
                    { name: "Delivery Stage", date: "", completed: false },
                    { name: "Payment & Activation Stage", date: "", completed: false },
                    { name: "Aftercare & Retention Stage", date: "", completed: false }
                ]};
            }
            return { ...c, stages };
        }

        let syncTimeout = null;
        function autoSync() {
            if (syncTimeout) clearTimeout(syncTimeout);
            syncTimeout = setTimeout(() => {
                syncLeadsToSheets(true);
            }, 3000); // 3 second delay to batch rapid changes
        }

        async function syncLeadsToSheets(silent = false) {
            if (!GAS_DEPLOY_URL || GAS_DEPLOY_URL.includes("PASTE_YOUR")) return;
            const icon = document.getElementById('sync-icon');
            if(icon && !silent) icon.classList.add('sync-spin');
            try {
                const leads = db.getLeads();
                const interactions = db.getInteractions();
                const leadData = leads.map(l => {
                    const leadInts = interactions.filter(i => i.leadId === l.id).sort((a,b) => b.timestamp - a.timestamp);
                    const lastNote = leadInts.find(i => i.type === 'Note')?.content || '';
                    return { ...l, interactionCount: leadInts.length, lastNote };
                });
                
                // Batch all syncs
                await Promise.all([
                    fetch(GAS_DEPLOY_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ sheetName: "Leads", data: leadData }) }),
                    fetch(GAS_DEPLOY_URL, { 
                        method: 'POST', 
                        mode: 'no-cors', 
                        body: JSON.stringify({ 
                            sheetName: "CRM", 
                            data: db.getClients().map(c => {
                                const flat = { ...c };
                                delete flat.stages;
                                c.stages.forEach((s, i) => {
                                    flat[`stage_${i+1}_name`] = s.name;
                                    flat[`stage_${i+1}_date`] = s.date;
                                    flat[`stage_${i+1}_completed`] = s.completed;
                                });
                                return flat;
                            }) 
                        }) 
                    }),
                    fetch(GAS_DEPLOY_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ sheetName: "FollowUps", data: db.getFollowUps() }) }),
                    fetch(GAS_DEPLOY_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ sheetName: "Templates", data: db.getTemplates() }) })
                ]);
                
                if (!silent) alert("Production Sync Complete!");
            } catch (e) { 
                console.error(e); 
                if (!silent) alert("Sync Failed."); 
            }
            finally { if(icon && !silent) icon.classList.remove('sync-spin'); }
        }

        // Horizontal Scroll for Kanban (Mobile Auto-Slide)
        let isDraggingLead = false;
        let currentTouchX = 0;
        function checkAutoSlide() {
            if (!isDraggingLead) return;
            const board = document.getElementById('kanban-board');
            if (!board) return;
            
            const viewportWidth = window.innerWidth;
            const threshold = 85; // Wider threshold for better mobile edge detection
            let scrollAmount = 0;

            if (currentTouchX > (viewportWidth - threshold)) {
                scrollAmount = 12; // Faster scroll
            } else if (currentTouchX < threshold && currentTouchX > 0) {
                scrollAmount = -12;
            }

            if (scrollAmount !== 0) {
                board.scrollLeft += scrollAmount;
            }
            requestAnimationFrame(checkAutoSlide);
        }
        window.addEventListener('touchmove', (e) => {
            if (isDraggingLead && e.touches[0]) currentTouchX = e.touches[0].clientX;
        }, { passive: true });
        window.addEventListener('mousemove', (e) => {
            if (isDraggingLead) currentTouchX = e.clientX;
        });

        function initSortable() {
            try {
                if (typeof Sortable === 'undefined') return;
                document.querySelectorAll('.kanban-col').forEach(col => {
                    new Sortable(col, {
                        group: 'leads', animation: 200, handle: '.drag-handle', forceFallback: true,
                        onStart: (evt) => {
                            isDraggingLead = true;
                            const board = document.getElementById('kanban-board');
                            if(board) {
                                board.classList.add('no-snap');
                                board.style.scrollSnapType = 'none';
                            }
                            requestAnimationFrame(checkAutoSlide);
                        },
                        onEnd: (evt) => {
                            isDraggingLead = false;
                            const board = document.getElementById('kanban-board');
                            if(board) {
                                board.classList.remove('no-snap');
                                board.style.scrollSnapType = 'x mandatory';
                            }
                            const next = evt.to.dataset.status; const prev = evt.from.dataset.status; const id = evt.item.dataset.id;
                            if (next !== prev) {
                                const ls = db.getLeads(); const l = ls.find(x => x.id === id);
                                if(l) { 
                                    l.status = next; db.saveLeads(ls); 
                                    db.addInteraction({ id: crypto.randomUUID(), leadId: id, type: 'Note', content: `Moved ${prev} -> ${next}`, timestamp: Date.now() }); 
                                    if(next === LeadStatus.WON) {
                                        db.createClient(l); 
                                        db.addInteraction({ id: crypto.randomUUID(), leadId: id, type: 'Note', content: `Converted to CRM Client`, timestamp: Date.now() }); 
                                    }
                                    autoSync();
                                    renderLeads();
                                }
                            }
                        }
                    });
                });
            } catch(e) { console.error("Sortable init error", e); }
        }

            const bar = document.getElementById('vertical-progress');

            const completedCount = client.stages.filter(s => s.completed).length;
            const pct = completedCount > 0 ? (completedCount / 6) * 100 : 0;
            bar.style.height = `calc(${pct}% - 8px)`;
            
            const today = new Date().setHours(0,0,0,0);
            const isAnyLate = client.stages.some(s => !s.completed && s.date && new Date(s.date) < today);
            if(isAnyLate) {
                bar.classList.remove('bg-emerald-500');
                bar.classList.add('bg-red-500');
            } else {
                bar.classList.remove('bg-red-500');
                bar.classList.add('bg-emerald-500');
            }
        }

        function toggleStageCompletion(clientId, stageIdx) {
            const cs = db.getClients();
            const c = cs.find(x => x.id === clientId);
            if(c) {
                const wasCompleted = c.stages[stageIdx].completed;
                c.stages[stageIdx].completed = !wasCompleted;
                
                // If the last stage is now completed and wasn't before
                if (stageIdx === 5 && c.stages[stageIdx].completed && !wasCompleted) {
                    c.projectCompletedAt = Date.now();
                    const followups = db.getFollowUps();
                    
                    // Helper to add months to date
                    const addMonths = (date, months) => {
                        const d = new Date(date);
                        d.setMonth(d.getMonth() + months);
                        return d.getTime();
                    };

                    const newFollowUps = [
                        { id: crypto.randomUUID(), clientId: c.id, clientName: c.name, company: c.company, type: '2 Month Review', date: addMonths(Date.now(), 2), completed: false },
                        { id: crypto.randomUUID(), clientId: c.id, clientName: c.name, company: c.company, type: '6 Month Health Check', date: addMonths(Date.now(), 6), completed: false },
                        { id: crypto.randomUUID(), clientId: c.id, clientName: c.name, company: c.company, type: '12 Month Anniversary', date: addMonths(Date.now(), 12), completed: false }
                    ];

                    followups.push(...newFollowUps);
                    db.saveFollowUps(followups);
                    
                    db.addInteraction({ 
                        id: crypto.randomUUID(), 
                        leadId: c.id, 
                        type: 'Note', 
                        content: `Project Marks as Completed! Retention cycle initiated.`,

            const scrollLeft = board.scrollLeft;
            const width = board.offsetWidth;
            const activeIdx = Math.round(scrollLeft / width);
            
            const dots = dotsCont.children;
            for(let i=0; i<dots.length; i++) {
                if(i === activeIdx) {
                    dots[i].className = "w-1.5 h-1.5 rounded-full transition-all bg-blue-500 w-3";

                    dots[i].className = "w-1.5 h-1.5 rounded-full transition-all bg-slate-300";

                            <div class="space-y-1">
                                <label class="text-[10px] font-black text-slate-400 uppercase ml-2 tracking-widest">Sales Status</label>
                                <div class="relative">
                                    <select name="status" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 focus:ring-4 focus:ring-indigo-100 focus:border-indigo-400 outline-none appearance-none font-bold text-slate-700 cursor-pointer">
                                        ${Object.values(LeadStatus).map(s => `<option value="${s}" ${l.status === s ? 'selected' : ''}>${s}</option>`).join('')}
                                    </select>
                                    <i data-lucide="layers" class="absolute right-4 top-4 text-slate-300 w-4 h-4 pointer-events-none"></i>
                                </div>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="space-y-1">
                                <label class="text-[10px] font-black text-slate-400 uppercase ml-2 tracking-widest">Mobile Contact</label>
                                <input name="phone" value="${l.phone || ''}" type="tel" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 focus:ring-4 focus:ring-indigo-100 focus:border-indigo-400 outline-none transition-all font-bold text-slate-700" placeholder="+91 00000 00000">
                            </div>
                            <div class="space-y-1">
                                <label class="text-[10px] font-black text-slate-400 uppercase ml-2 tracking-widest">Birthday</label>
                                <input name="birthday" value="${l.birthday || ''}" type="date" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 focus:ring-4 focus:ring-indigo-100 focus:border-indigo-400 outline-none transition-all font-bold text-slate-700">
                            </div>
                        </div>

                        <div class="space-y-1">
                            <label class="text-[10px] font-black text-slate-400 uppercase ml-2 tracking-widest">Email Address</label>
                            <input name="email" value="${l.email || ''}" type="email" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 focus:ring-4 focus:ring-indigo-100 focus:border-indigo-400 outline-none transition-all font-bold text-slate-700" placeholder="example@domain.com">
                        </div>

                        <div class="space-y-1">
                            <label class="text-[10px] font-black text-slate-400 uppercase ml-2 tracking-widest">Internal Retention Notes</label>
                            <textarea name="extraNotes" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 focus:ring-4 focus:ring-indigo-100 focus:border-indigo-400 outline-none transition-all font-medium text-slate-700 h-24" placeholder="Add specific client preferences or background...">${l.extraNotes || ''}</textarea>
                        </div>
                        
                        <div class="pt-6 flex flex-col sm:flex-row gap-3">
                            <button type="button" onclick="deleteLeadConfirm('${l.id}')" class="w-full sm:w-auto px-8 py-4 bg-red-50 text-red-600 font-black rounded-[1.25rem] hover:bg-red-100 transition-all active:scale-95 uppercase tracking-widest text-xs">Delete Lead</button>
                            <button type="submit" class="flex-1 py-4 bg-indigo-600 text-white font-black rounded-[1.25rem] hover:bg-indigo-700 shadow-xl shadow-indigo-100 transition-all active:scale-95 uppercase tracking-widest text-xs">Commit Changes</button>
                        </div>
                    </form>
                </div>
            `;
            if (typeof lucide !== 'undefined') lucide.createIcons();
        }

        function handleLeadUpdate(e, id) {
            e.preventDefault();
            const fd = new FormData(e.target);
            const ls = db.getLeads();
            const idx = ls.findIndex(x => x.id === id);
            if(idx === -1) return;
            
            const oldStatus = ls[idx].status;
            const newStatus = fd.get('status');

            ls[idx] = { 
                ...ls[idx], 
                name: fd.get('name'), 
                company: fd.get('company'), 
                category: fd.get('category'), 
                status: newStatus,
                phone: fd.get('phone'),
                email: fd.get('email'),
                birthday: fd.get('birthday'),
                extraNotes: fd.get('extraNotes')
            };
            
            db.saveLeads(ls);
            if(oldStatus !== newStatus) {
                db.addInteraction({ id: crypto.randomUUID(), leadId: id, type: 'Note', content: `Status changed from ${oldStatus} to ${newStatus}`, timestamp: Date.now() });
                if(newStatus === LeadStatus.WON) db.createClient(ls[idx]);
            } else {
                db.addInteraction({ id: crypto.randomUUID(), leadId: id, type: 'Note', content: `Profile updated`, timestamp: Date.now() });
            }
            
            autoSync();
            renderLeadModalContent();
            renderLeads();
        }

        function deleteLeadConfirm(id) {
            if(confirm("Are you sure you want to delete this lead? This cannot be undone.")) {
                db.deleteLead(id);
                closeModal('lead-modal');
                renderLeads();
            }
        }

        function jumpToStatus(status) {
            location.hash = '#leads';
            setTimeout(() => {
                const board = document.getElementById('kanban-board');
                if(!board) return;
                const colTarget = board.querySelector(`[data-status="${status}"]`);
                if(colTarget) {
                    const colWrapper = colTarget.closest('.snap-center');
                    if(colWrapper) {
                        board.scrollTo({
                            left: colWrapper.offsetLeft - 16,
                            behavior: 'smooth'
                        });
                    }
                }
            }, 150);
        }

        let currentLeadId = null;
        function addNote() {
            const cin = document.getElementById('note-in');
            const val = cin.value.trim();
            if(!val || !currentLeadId) return;
            db.addInteraction({ id: crypto.randomUUID(), leadId: currentLeadId, type: 'Note', content: val, timestamp: Date.now() });
            cin.value = '';
            renderLeadModalContent();
        }

        function updateLeadFollowUp(id, key, val) {
            const ls = db.getLeads();
            const l = ls.find(x => x.id === id);
            if(l) {
                l[key] = val;
                db.saveLeads(ls);
                if(key === 'followUpDate' && val) {
                    db.addInteraction({ id: crypto.randomUUID(), leadId: id, type: 'Note', content: `Follow-up date set to ${val}`, timestamp: Date.now() });
                }
                autoSync();
                // We don't necessarily need to re-render everything if it's just a data update, 
                // but for followUpDate we might want to update the history shown in modal
                if(key === 'followUpDate') renderLeadModalContent();
            }
        }

        async function sendFollowUpWhatsApp(id) {
            const ls = db.getLeads();
            const l = ls.find(x => x.id === id);
            if(!l) return;
            
            const msgArea = document.getElementById(`fu-msg-${l.id}`);
            const msg = msgArea ? msgArea.value.trim() : (l.followUpMsg || '');
            
            // Save the message content
            l.followUpMsg = msg;
            db.saveLeads(ls);
            
            const phoneStr = String(l.phone || '');
            const rawPhone = phoneStr.replace(/\D/g, '');
            const waPhone = rawPhone.length === 10 ? '91' + rawPhone : rawPhone;
            
            const encodedMsg = encodeURIComponent(msg);
            const waUrl = `https://wa.me/${waPhone}?text=${encodedMsg}`;
            
            logAction(id, 'WhatsApp');
            window.open(waUrl, '_blank');
            autoSync();
        }

        function logAction(id, type) {
            db.addInteraction({ id: crypto.randomUUID(), leadId: id, type: type, content: `Logged ${type} action`, timestamp: Date.now() });
            if(id === currentLeadId) renderLeadModalContent();
        }

        function addAgentMsg(t, u=false) {
            document.getElementById('agent-chat-area').insertAdjacentHTML('beforeend', `<div class="flex ${u?'justify-end':'justify-start'} animate-fade-in"><div class="max-w-[85%] p-3 rounded-2xl text-sm ${u?'bg-blue-600 text-white':'bg-white text-slate-700 shadow-sm border'}">${t}</div></div>`);
            document.getElementById('agent-chat-area').scrollTop = 9999;
        }
        function resetAgentOptions() {
            const opts = [
                {id:'sum', label:'Status Summary'}, 
                {id:'new', label:'Show New'}, 
                {id:'sync', label:'Cloud Refresh'},
                {id:'over', label:'Overdue Tasks'}
            ];
            document.getElementById('agent-options').innerHTML = opts.map(o => `<button onclick="handleAgentQuery('${o.id}','${o.label}')" class="px-3 py-1.5 bg-slate-50 border border-slate-200 hover:bg-slate-100 rounded-full text-[11px] font-bold transition-transform active:scale-95">${o.label}</button>`).join('');
        }
        function handleAgentQuery(id, label) {
            addAgentMsg(label, true);
            setTimeout(() => {
                let r = "I'm checking on that for you...";
                if(id === 'sum') {
                    const leads = db.getLeads();
                    r = `You currently have ${leads.length} total leads in your pipeline.`;
                }
                else if(id === 'new') {
                    const count = db.getLeads().filter(x=>x.status===LeadStatus.NEW).length;
                    r = `There are ${count} leads in 'New' status waiting for contact.`;
                }
                else if(id === 'sync') {
                    r = "Initiating cloud pull... I'll update the list as soon as data arrives.";
                    fetchLeadsFromSheets(false);
                }
                else if(id === 'over') {
                    const overdue = db.getTasks().filter(t => !t.isCompleted && new Date(t.dueDate) < new Date());
                    r = overdue.length ? `You have ${overdue.length} overdue tasks that need attention.` : "No overdue tasks! You're all caught up.";
                }
                addAgentMsg(r);
            }, 600);
        }
        resetAgentOptions();
    </script>
</body>
</html>
