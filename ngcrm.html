<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SoloCRM</title>
    
    <!-- Dependencies (Using CDNs for functionality) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

    <!-- Config -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd',
                400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8',
              }
            },
            animation: { 'slide-up': 'slideUp 0.3s ease-out forwards', 'fade-in': 'fadeIn 0.3s ease-out forwards' },
            keyframes: {
              slideUp: { '0%': { transform: 'translateY(100%)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } },
              fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } }
            }
          }
        }
      }
    </script>

    <style>
      /* Hide Scrollbars */
      ::-webkit-scrollbar { display: none; }
      * { -ms-overflow-style: none; scrollbar-width: none; }
      
      body { 
          background-color: #f8fafc; 
          -webkit-tap-highlight-color: transparent; 
          overscroll-behavior-y: none; 
          font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      }

      /* SortableJS Classes */
      .sortable-ghost { opacity: 0.4; background: #eff6ff; border: 2px dashed #3b82f6; }
      
      /* Dragging visual feedback */
      .sortable-drag { 
          cursor: grabbing; 
          opacity: 1; 
          background: white; 
          transform: rotate(3deg) scale(1.02); 
          box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2) !important; 
          z-index: 9999 !important; 
      }
      
      /* Snap scrolling for Kanban */
      .snap-x-mandatory {
          scroll-snap-type: x mandatory;
      }
      .snap-center {
          scroll-snap-align: center;
          scroll-snap-stop: always; /* Ensure we stop exactly on a column */
      }

      /* Disable snap and smoothing during drag to allow JS auto-scroll */
      .no-snap {
          scroll-snap-type: none !important;
          scroll-behavior: auto !important;
      }
      
      .chat-bubble { animation: fadeIn 0.3s ease-out forwards; }
      
      .sync-spin { animation: spin 2s linear infinite; }
      @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-slate-900 selection:bg-blue-100 selection:text-blue-900">

    <div id="app" class="flex flex-col h-screen">
        
        <!-- Header -->
        <header class="h-20 md:h-24 bg-slate-50/90 backdrop-blur-md flex items-center justify-between px-4 md:px-8 shrink-0 z-10 sticky top-0 border-b border-transparent transition-all">
            <div class="flex items-center">
                <img src="Logo2.png" alt="SoloCRM" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
                <span class="hidden text-2xl font-bold text-blue-600 flex items-center gap-2">
                    <i data-lucide="shield-check"></i> SoloCRM
                </span>
            </div>
            
            <div class="flex items-center gap-4">
                <!-- Sync Button -->
                <button onclick="fetchLeadsFromSheets()" id="sync-btn" class="flex items-center gap-2 px-4 py-2 text-xs font-bold bg-white text-blue-600 border border-blue-100 rounded-lg hover:bg-blue-50 transition-all shadow-sm">
                    <i data-lucide="refresh-cw" id="sync-icon" class="w-4 h-4"></i>
                    <span class="hidden sm:inline">Refresh Data</span>
                </button>

                <!-- Desktop User Indicator -->
                <div class="hidden md:flex items-center gap-3 px-4 py-2 text-xs text-slate-400 bg-white/50 rounded-lg border border-slate-100">
                    <div class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></div>
                    System Online
                </div>
            </div>
        </header>

        <!-- Sidebar (Desktop) -->
        <aside class="hidden md:flex flex-col fixed left-0 top-24 bottom-0 w-64 bg-slate-50 border-r border-slate-200/50 p-4 z-20">
            <div class="space-y-1" id="desktop-nav">
                <!-- Nav items rendered by JS -->
            </div>
        </aside>

        <!-- Main Content -->
        <main id="main-content" class="flex-1 overflow-y-auto overflow-x-hidden relative scroll-smooth md:ml-64">
            <!-- Content rendered by JS -->
        </main>

        <!-- Bottom Navigation (Mobile) -->
        <nav class="md:hidden h-16 bg-white border-t border-slate-200 flex justify-around items-center shrink-0 pb-safe shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.02)] z-30" id="mobile-nav">
            <!-- Nav items rendered by JS -->
        </nav>

    </div>

    <!-- Agent Floating Button -->
    <button onclick="openAgentModal()" class="fixed bottom-24 md:bottom-10 left-4 md:left-[280px] bg-slate-900 text-white p-4 rounded-full shadow-xl hover:bg-slate-800 transition-transform active:scale-95 z-40 flex items-center gap-2 group">
        <i data-lucide="bot"></i>
        <span class="max-w-0 overflow-hidden group-hover:max-w-xs transition-all duration-300 whitespace-nowrap text-sm font-bold">Ask Jerry</span>
    </button>

    <!-- MODALS -->

    <!-- Agent Modal -->
    <div id="agent-modal" class="hidden fixed inset-0 z-50 flex items-end md:items-center justify-center">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm transition-opacity" onclick="closeModal('agent-modal')"></div>
        <div class="relative bg-white w-full md:max-w-md md:rounded-2xl rounded-t-3xl shadow-2xl flex flex-col animate-slide-up h-[80vh] md:h-[70vh]">
            <div class="flex items-center justify-between px-6 py-4 border-b border-gray-50 bg-slate-50 rounded-t-3xl md:rounded-t-2xl">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-slate-900 rounded-full flex items-center justify-center text-white">
                        <i data-lucide="bot"></i>
                    </div>
                    <div>
                        <h2 class="text-lg font-bold text-gray-800">Jerry</h2>
                        <div class="flex items-center gap-1.5">
                            <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                            <span class="text-[10px] text-slate-500 font-medium uppercase tracking-wider">Online</span>
                        </div>
                    </div>
                </div>
                <button onclick="closeModal('agent-modal')" class="p-2 bg-white hover:bg-red-50 text-gray-500 hover:text-red-600 rounded-full border border-gray-100">
                    <i data-lucide="x"></i>
                </button>
            </div>
            
            <div class="flex-1 overflow-y-auto p-4 space-y-4 bg-slate-50/50" id="agent-chat-area"></div>

            <div class="p-4 bg-white border-t border-gray-100 pb-safe">
                <div class="flex items-center justify-between mb-3">
                    <p class="text-xs font-bold text-slate-400 uppercase tracking-wider">Suggested Actions:</p>
                    <button onclick="resetAgentOptions()" class="text-[10px] text-blue-600 font-bold hover:underline">Main Menu</button>
                </div>
                <div class="flex flex-wrap gap-2" id="agent-options"></div>
            </div>
        </div>
    </div>

    <!-- Lead Details Modal -->
    <div id="lead-modal" class="fixed inset-0 z-50 flex items-end md:items-center justify-center hidden">
        <div class="absolute inset-0 bg-slate-900/20 backdrop-blur-sm transition-opacity" onclick="closeModal('lead-modal')"></div>
        <div class="relative bg-white w-full md:max-w-lg md:rounded-2xl rounded-t-3xl shadow-2xl flex flex-col animate-slide-up h-[92vh] md:h-auto md:max-h-[85vh]">
            <div class="md:hidden w-full flex justify-center pt-3 pb-1" onclick="closeModal('lead-modal')">
                <div class="w-12 h-1.5 bg-gray-200 rounded-full"></div>
            </div>
            <div class="flex items-center justify-between px-6 py-4 border-b border-gray-50">
                <h2 class="text-xl font-bold text-gray-800 tracking-tight">Lead Profile</h2>
                <button onclick="closeModal('lead-modal')" class="p-2 bg-gray-50 hover:bg-blue-50 text-gray-500 hover:text-blue-600 rounded-full transition-colors">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <div class="overflow-y-auto p-6 flex-1 bg-white" id="lead-modal-content"></div>
        </div>
    </div>

    <!-- Add Lead Modal -->
    <div id="add-modal" class="hidden fixed inset-0 z-50 flex items-end md:items-center justify-center">
        <div class="absolute inset-0 bg-slate-900/20 backdrop-blur-sm transition-opacity" onclick="closeModal('add-modal')"></div>
        <div class="relative bg-white w-full md:max-w-lg md:rounded-2xl rounded-t-3xl shadow-2xl flex flex-col animate-slide-up h-auto pb-6">
            <div class="flex items-center justify-between px-6 py-4 border-b border-gray-50">
                <h2 class="text-xl font-bold text-gray-800">New Lead</h2>
                <button onclick="closeModal('add-modal')" class="p-2 bg-gray-50 hover:bg-red-50 text-gray-500 hover:text-red-600 rounded-full">
                    <i data-lucide="x"></i>
                </button>
            </div>
            
            <div class="flex border-b border-gray-100 px-6">
                <button id="tab-manual" class="flex-1 py-4 text-sm font-bold text-blue-600 border-b-2 border-blue-600 transition-colors" onclick="switchTab('manual')">Manual Entry</button>
                <button id="tab-import" class="flex-1 py-4 text-sm font-bold text-slate-400 border-b-2 border-transparent hover:text-slate-600 transition-colors" onclick="switchTab('import')">Import Excel</button>
            </div>

            <div class="p-6">
                <form id="add-lead-form" class="space-y-4">
                    <div class="relative">
                        <i data-lucide="user" class="absolute left-3 top-3.5 text-slate-400 w-4 h-4"></i>
                        <input name="name" required class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-10 pr-4 py-3 focus:ring-2 focus:ring-blue-100 outline-none" placeholder="Full Name">
                    </div>
                    <div class="relative">
                        <i data-lucide="briefcase" class="absolute left-3 top-3.5 text-slate-400 w-4 h-4"></i>
                        <input name="company" class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-10 pr-4 py-3 focus:ring-2 focus:ring-blue-100 outline-none" placeholder="Company Name">
                    </div>
                    <div class="relative">
                        <i data-lucide="phone" class="absolute left-3 top-3.5 text-slate-400 w-4 h-4"></i>
                        <input name="phone" type="tel" class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-10 pr-4 py-3 focus:ring-2 focus:ring-blue-100 outline-none" placeholder="Phone Number">
                    </div>
                    <div class="relative">
                        <i data-lucide="mail" class="absolute left-3 top-3.5 text-slate-400 w-4 h-4"></i>
                        <input name="email" type="email" class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-10 pr-4 py-3 focus:ring-2 focus:ring-blue-100 outline-none" placeholder="Email Address">
                    </div>
                    <button type="submit" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 mt-6 shadow-lg shadow-blue-200 flex justify-center items-center gap-2 transition-all">
                        <i data-lucide="user-plus" class="w-5 h-5"></i> Create Lead
                    </button>
                </form>

                <div id="import-form" class="hidden space-y-5 animate-fade-in">
                    <div class="border-2 border-dashed border-blue-200 rounded-2xl p-8 text-center bg-blue-50/50 relative group transition-colors hover:bg-blue-50">
                        <input type="file" id="excel-upload" accept=".xlsx, .xls, .csv" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" onchange="handleFileUpload(this)">
                        <div class="pointer-events-none">
                            <div class="bg-white w-16 h-16 rounded-full shadow-sm flex items-center justify-center mx-auto mb-4 group-hover:scale-110 transition-transform">
                                <i data-lucide="upload-cloud" class="w-8 h-8 text-blue-500"></i>
                            </div>
                            <p class="text-base font-bold text-slate-800">Click to Upload Excel</p>
                            <p class="text-xs text-slate-500 mt-2">Supports .xlsx, .xls, .csv</p>
                        </div>
                    </div>
                    
                    <div id="import-preview" class="hidden bg-white border border-slate-200 rounded-xl p-4 shadow-sm">
                        <div class="flex justify-between items-center mb-4">
                            <div class="flex items-center gap-3">
                                <div class="bg-emerald-100 text-emerald-600 p-2 rounded-lg">
                                    <i data-lucide="file-spreadsheet"></i>
                                </div>
                                <div>
                                    <p class="font-bold text-slate-800 text-sm">File Ready</p>
                                    <p class="text-xs text-slate-500">Found <span id="import-count" class="font-bold text-emerald-600">0</span> leads</p>
                                </div>
                            </div>
                        </div>
                        <button onclick="confirmImport()" class="w-full bg-emerald-500 text-white font-bold py-3 rounded-xl hover:bg-emerald-600 shadow-lg shadow-emerald-200 flex items-center justify-center gap-2 transition-transform active:scale-95">
                            <i data-lucide="check-circle" class="w-5 h-5"></i> Import Leads
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- LOGIC -->
    <script>
        const GAS_DEPLOY_URL = "https://script.google.com/macros/s/AKfycbzjKeEkR3vYkSlQfVD7iv739qsGlADUH8Bmjjhaa3DbfuD_sWhjckOPRlYaIjtMb24Z/exec";

        const LeadStatus = {
            NEW: 'New', CONTACTED: 'Contacted', FOLLOW_UP: 'Follow-Up', 
            INTERESTED: 'Interested', WON: 'Won', LOST: 'Lost'
        };
        const InteractionType = { CALL: 'Call', WHATSAPP: 'WhatsApp', EMAIL: 'Email', NOTE: 'Note' };
        
        const COLUMNS = [
            { id: LeadStatus.NEW, title: 'New' }, { id: LeadStatus.CONTACTED, title: 'Contacted' },
            { id: LeadStatus.FOLLOW_UP, title: 'Follow Up' }, { id: LeadStatus.INTERESTED, title: 'Interested' },
            { id: LeadStatus.WON, title: 'Won' }, { id: LeadStatus.LOST, title: 'Lost' }
        ];

        class Database {
            constructor() {
                this.KEYS = { LEADS: 'solocrm_leads', TASKS: 'solocrm_tasks', INTERACTIONS: 'solocrm_interactions', CLIENTS: 'solocrm_clients' };
                this.init();
            }
            init() {
                if (!localStorage.getItem(this.KEYS.LEADS)) {
                    localStorage.setItem(this.KEYS.LEADS, JSON.stringify([]));
                }
                if (!localStorage.getItem(this.KEYS.TASKS)) localStorage.setItem(this.KEYS.TASKS, JSON.stringify([]));
                if (!localStorage.getItem(this.KEYS.INTERACTIONS)) localStorage.setItem(this.KEYS.INTERACTIONS, JSON.stringify([]));
                if (!localStorage.getItem(this.KEYS.CLIENTS)) localStorage.setItem(this.KEYS.CLIENTS, JSON.stringify([]));
                
                // Trigger initial fetch from cloud
                fetchLeadsFromSheets(true);
            }
            load(key) { return JSON.parse(localStorage.getItem(key) || '[]'); }
            save(key, data) { localStorage.setItem(key, JSON.stringify(data)); }
            getLeads() { return this.load(this.KEYS.LEADS); }
            saveLeads(leads) { this.save(this.KEYS.LEADS, leads); }
            getTasks() { return this.load(this.KEYS.TASKS); }
            saveTasks(tasks) { this.save(this.KEYS.TASKS, tasks); }
            getInteractions() { return this.load(this.KEYS.INTERACTIONS); }
            getClients() { return this.load(this.KEYS.CLIENTS); }
            addInteraction(interaction) {
                const ints = this.getInteractions(); ints.push(interaction); this.save(this.KEYS.INTERACTIONS, ints);
                const leads = this.getLeads(); const lead = leads.find(l => l.id === interaction.leadId);
                if (lead) { 
                    lead.lastInteraction = interaction.timestamp; 
                    this.saveLeads(leads); 
                    autoSync();
                }
            }
            addLead(lead) { 
                const leads = this.getLeads(); 
                leads.push(lead); 
                this.saveLeads(leads); 
                autoSync();
            }
            deleteLead(id) { 
                const leads = this.getLeads().filter(l => l.id !== id); 
                this.saveLeads(leads); 
                autoSync();
            }
            createClient(lead) {
                const clients = this.getClients(); if (clients.find(c => c.leadId === lead.id)) return;
                clients.push({ id: crypto.randomUUID(), leadId: lead.id, name: lead.name, serviceType: 'New Client', renewalDate: Date.now() + 30 * 24 * 3600 * 1000 });
                this.save(this.KEYS.CLIENTS, clients);
            }
        }
        const db = new Database();

        async function fetchLeadsFromSheets(silent = false) {
            if (!GAS_DEPLOY_URL || GAS_DEPLOY_URL.includes("PASTE_YOUR")) return;
            const icon = document.getElementById('sync-icon');
            if(icon && !silent) icon.classList.add('sync-spin');
            
            try {
                const response = await fetch(GAS_DEPLOY_URL, { 
                    method: 'GET',
                    redirect: 'follow'
                });
                
                const text = await response.text();
                
                // If it's HTML, GAS is likely asking for login or script is not "Anyone"
                if (text.trim().startsWith("<!DOCTYPE") || text.trim().startsWith("<html")) {
                    console.error("GAS returned HTML:", text.substring(0, 200));
                    throw new Error("Invalid Cloud Response: Please ensure the script is deployed as 'Web App', Execute as 'Me', and 'Who has access: Anyone'.");
                }

                try {
                    const data = JSON.parse(text);
                    if (data && Array.isArray(data)) {
                        db.saveLeads(data);
                        if (!silent) alert(`Synchronization Successful! Records found: ${data.length}`);
                        handleRoute(); 
                    } else if (data && data.error) {
                        throw new Error(data.error);
                    }
                } catch(pe) {
                    console.error("JSON Parse Error:", text);
                    throw new Error("Cloud script didn't return valid JSON. Check your Apps Script deployment.");
                }
            } catch (e) {
                console.error("Cloud Sync Error:", e);
                if (!silent) alert(e.message || "Failed to reach the cloud server.");
            } finally {
                if(icon && !silent) icon.classList.remove('sync-spin');
            }
        }

        let syncTimeout = null;
        function autoSync() {
            if (syncTimeout) clearTimeout(syncTimeout);
            syncTimeout = setTimeout(() => {
                syncLeadsToSheets(true);
            }, 3000); // 3 second delay to batch rapid changes
        }

        async function syncLeadsToSheets(silent = false) {
            if (!GAS_DEPLOY_URL || GAS_DEPLOY_URL.includes("PASTE_YOUR")) return;
            const icon = document.getElementById('sync-icon');
            if(icon && !silent) icon.classList.add('sync-spin');
            try {
                const leads = db.getLeads();
                const interactions = db.getInteractions();
                const data = leads.map(l => ({ 
                    ...l, 
                    id: l.id,
                    interactionCount: interactions.filter(i => i.leadId === l.id).length 
                }));
                
                await fetch(GAS_DEPLOY_URL, { 
                    method: 'POST', 
                    mode: 'no-cors', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data) 
                });
                
                if (!silent) alert("Data pushed to cloud!");
            } catch (e) { 
                console.error(e); 
                if (!silent) alert("Sync Failed."); 
            }
            finally { if(icon && !silent) icon.classList.remove('sync-spin'); }
        }

        // Horizontal Scroll for Kanban (Mobile Auto-Slide)
        let isDraggingLead = false;
        let currentTouchX = 0;
        function checkAutoSlide() {
            if (!isDraggingLead) return;
            const board = document.getElementById('kanban-board');
            if (!board) return;
            
            const viewportWidth = window.innerWidth;
            const threshold = 85; // Wider threshold for better mobile edge detection
            let scrollAmount = 0;

            if (currentTouchX > (viewportWidth - threshold)) {
                scrollAmount = 12; // Faster scroll
            } else if (currentTouchX < threshold && currentTouchX > 0) {
                scrollAmount = -12;
            }

            if (scrollAmount !== 0) {
                board.scrollLeft += scrollAmount;
            }
            requestAnimationFrame(checkAutoSlide);
        }
        window.addEventListener('touchmove', (e) => {
            if (isDraggingLead && e.touches[0]) currentTouchX = e.touches[0].clientX;
        }, { passive: true });
        window.addEventListener('mousemove', (e) => {
            if (isDraggingLead) currentTouchX = e.clientX;
        });

        function renderNav() {
            const routes = [ { id: 'dashboard', icon: 'layout-dashboard', label: 'Dash' }, { id: 'leads', icon: 'users', label: 'Leads' }, { id: 'tasks', icon: 'check-square', label: 'Tasks' }, { id: 'clients', icon: 'briefcase', label: 'Clients' } ];
            const current = location.hash.replace('#', '') || 'dashboard';
            document.getElementById('desktop-nav').innerHTML = routes.map(r => `
                <a href="#${r.id}" class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium transition-all ${current === r.id ? 'bg-blue-50 text-blue-700 shadow-sm border border-blue-100' : 'text-slate-600 hover:bg-white'}">
                    <i data-lucide="${r.icon}" class="w-4 h-4"></i> ${r.label}
                </a>
            `).join('');
            document.getElementById('mobile-nav').innerHTML = routes.map(r => `
                <a href="#${r.id}" class="flex flex-col items-center justify-center w-full h-full gap-1 ${current === r.id ? 'text-blue-600' : 'text-slate-400'}">
                    <i data-lucide="${r.icon}" class="w-5 h-5"></i>
                    <span class="text-[10px] font-medium">${r.label}</span>
                </a>
            `).join('');
            lucide.createIcons();
        }

        function renderDashboard() {
            const leads = db.getLeads();
            const tasks = db.getTasks();
            const interactions = db.getInteractions();

            const counts = {}; Object.values(LeadStatus).forEach(s => counts[s] = 0);
            leads.forEach(l => counts[l.status]++);

            const urgentTasks = tasks.filter(t => !t.isCompleted);
            const maxCount = Math.max(...Object.values(counts), 1);

            const today = new Date().setHours(0,0,0,0);
            const activity = {
                calls: interactions.filter(i => i.type === 'Call' && i.timestamp >= today).length,
                msgs: interactions.filter(i => i.type === 'WhatsApp' && i.timestamp >= today).length,
                emails: interactions.filter(i => i.type === 'Email' && i.timestamp >= today).length
            };

            document.getElementById('main-content').innerHTML = `
                <div class="p-4 md:p-8 w-full max-w-[1800px] mx-auto space-y-6 pb-24 md:pb-12">
                    <div class="flex flex-col gap-1">
                        <h1 class="text-2xl md:text-3xl font-bold text-slate-900">Dashboard</h1>
                        <p class="text-slate-500 text-sm">Welcome back, Founder.</p>
                    </div>

                    <div class="grid grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6">
                        <div class="bg-gradient-to-br from-blue-600 to-blue-500 p-5 rounded-2xl text-white shadow-lg">
                            <p class="text-xs font-bold uppercase opacity-80 mb-1">New Leads</p>
                            <p class="text-4xl font-bold">${counts[LeadStatus.NEW]}</p>
                        </div>
                        <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm">
                            <p class="text-xs font-bold uppercase text-slate-400 mb-1">Total Leads</p>
                            <p class="text-4xl font-bold text-slate-800">${leads.length}</p>
                        </div>
                        <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm">
                            <p class="text-xs font-bold uppercase text-emerald-500 mb-1">Won Deals</p>
                            <p class="text-4xl font-bold text-slate-800">${counts[LeadStatus.WON]}</p>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="bg-white rounded-2xl border border-slate-200 p-6 shadow-sm">
                            <h2 class="font-bold text-lg mb-5 flex items-center gap-2"><i data-lucide="activity" class="text-blue-500"></i> Today's Actions</h2>
                            <div class="grid grid-cols-3 gap-4">
                                <div class="bg-slate-50 p-4 rounded-xl text-center">
                                    <span class="text-2xl font-bold block">${activity.calls}</span>
                                    <span class="text-[10px] uppercase text-slate-400 font-bold">Calls</span>
                                </div>
                                <div class="bg-slate-50 p-4 rounded-xl text-center">
                                    <span class="text-2xl font-bold block">${activity.msgs}</span>
                                    <span class="text-[10px] uppercase text-slate-400 font-bold">Msgs</span>
                                </div>
                                <div class="bg-slate-50 p-4 rounded-xl text-center">
                                    <span class="text-2xl font-bold block">${activity.emails}</span>
                                    <span class="text-[10px] uppercase text-slate-400 font-bold">Emails</span>
                                </div>
                            </div>
                        </div>
                        <div class="bg-white rounded-2xl border border-slate-200 p-6 shadow-sm">
                            <h2 class="font-bold text-lg mb-5">Pipeline</h2>
                            <div class="space-y-4">
                                ${Object.keys(LeadStatus).slice(0,3).map(k => {
                                    const s = LeadStatus[k];
                                    const pct = (counts[s] / maxCount) * 100;
                                    return `
                                        <div>
                                            <div class="flex justify-between text-[10px] uppercase font-bold text-slate-500 mb-1"><span>${s}</span><span>${counts[s]}</span></div>
                                            <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                                                <div class="bg-blue-500 h-full rounded-full transition-all" style="width: ${pct}%"></div>
                                            </div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    </div>

                    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                        <div class="p-5 border-b border-slate-100 flex justify-between items-center">
                            <h2 class="font-bold">Priority Tasks</h2>
                            <span class="text-xs bg-red-100 text-red-600 px-2 py-1 rounded-full font-bold">${urgentTasks.length} Due</span>
                        </div>
                        <div class="p-4 space-y-3">
                            ${urgentTasks.slice(0, 3).map(t => `
                                <div class="flex items-center gap-4 bg-slate-50 p-3 rounded-xl">
                                    <div class="w-1 h-8 bg-red-400 rounded-full"></div>
                                    <span class="flex-1 font-medium text-sm">${t.title}</span>
                                    <button onclick="toggleTask('${t.id}')" class="text-slate-300 hover:text-blue-500"><i data-lucide="check"></i></button>
                                </div>
                            `).join('')}
                            ${!urgentTasks.length ? '<p class="text-center text-slate-400 py-4 text-sm">No urgent tasks.</p>' : ''}
                        </div>
                    </div>
                </div>`;
            lucide.createIcons();
        }

        function renderLeads() {
            const leads = db.getLeads();
            const boardEl = document.getElementById('kanban-board');
            const cols = COLUMNS.map(col => {
                const cLeads = leads.filter(l => l.status === col.id);
                return `
                    <div class="flex flex-col h-full w-full shrink-0 md:w-96 snap-center snap-stop-always bg-slate-50 md:bg-transparent">
                        <div class="p-4 md:p-3 sticky top-0 z-10 flex justify-between items-center backdrop-blur-sm">
                            <h3 class="font-bold text-slate-700 text-xs uppercase flex items-center gap-2">
                                <div class="w-2 h-2 rounded-full ${cLeads.length ? 'bg-blue-500' : 'bg-slate-300'}"></div>
                                ${col.title}
                            </h3>
                            <span class="bg-white px-2 py-1 rounded text-[10px] font-bold text-slate-600 shadow-sm">${cLeads.length}</span>
                        </div>
                        <div class="flex-1 p-4 md:p-2 overflow-y-auto kanban-col" data-status="${col.id}">
                            ${cLeads.map(l => {
                                const rawPhone = l.phone.replace(/\D/g, '');
                                const waPhone = rawPhone.length === 10 ? '91' + rawPhone : rawPhone;
                                return `
                                <div class="bg-white p-3 rounded-xl border border-gray-100 shadow-sm mb-3 group hover:border-blue-300 relative pl-10 cursor-pointer" data-id="${l.id}" onclick="openLeadModal('${l.id}')">
                                    <div class="drag-handle absolute left-0 top-0 bottom-0 w-8 flex items-center justify-center cursor-grab active:cursor-grabbing text-slate-300 hover:text-blue-500 bg-gray-50/10 border-r border-gray-50 rounded-l-xl">
                                        <i data-lucide="grip-vertical" class="w-4 h-4"></i>
                                    </div>
                                    <div class="flex justify-between items-start mb-1">
                                        <h3 class="font-semibold text-gray-900 truncate text-sm">${l.name}</h3>
                                        <span class="text-[9px] text-gray-400 bg-gray-50 px-1 py-0.5 rounded">${new Date(l.createdAt).toLocaleDateString()}</span>
                                    </div>
                                    <div class="text-[10px] text-slate-400 mb-2 truncate">${l.company || ''}</div>
                                    <div class="flex items-center gap-2 mt-2 pt-2 border-t border-slate-50" onclick="event.stopPropagation()">
                                        <a href="tel:${l.phone}" onclick="logAction('${l.id}', 'Call')" class="p-1.5 rounded-full bg-blue-50 text-blue-600 hover:bg-blue-100"><i data-lucide="phone" class="w-3.5 h-3.5"></i></a>
                                        <a href="https://wa.me/${waPhone}" target="_blank" onclick="logAction('${l.id}', 'WhatsApp')" class="p-1.5 rounded-full bg-emerald-50 text-emerald-700 hover:bg-emerald-100"><i data-lucide="message-circle" class="w-3.5 h-3.5"></i></a>
                                        <a href="mailto:${l.email}" onclick="logAction('${l.id}', 'Email')" class="p-1.5 rounded-full bg-slate-50 text-slate-600 hover:bg-slate-100"><i data-lucide="mail" class="w-3.5 h-3.5"></i></a>
                                    </div>
                                </div>
                            `}).join('')}
                        </div>
                    </div>`;
            }).join('');
            document.getElementById('main-content').innerHTML = `
                <div class="h-full flex flex-col relative bg-white md:bg-slate-50/50 overflow-hidden">
                    <div class="flex-1 flex flex-row overflow-x-auto snap-x-mandatory scroll-smooth p-0 md:p-6" id="kanban-board">
                        ${cols}
                    </div>
                    <button onclick="openAddModal()" class="fixed bottom-24 md:bottom-10 right-4 md:right-10 bg-blue-600 text-white p-4 rounded-full shadow-xl hover:bg-blue-700 active:scale-95 transition-all z-40">
                        <i data-lucide="plus" class="w-7 h-7"></i>
                    </button>
                </div>`;
            
            document.querySelectorAll('.kanban-col').forEach(col => {
                new Sortable(col, {
                    group: 'leads', animation: 200, handle: '.drag-handle', forceFallback: true,
                    onStart: (evt) => {
                        isDraggingLead = true;
                        document.getElementById('kanban-board').classList.add('no-snap');
                        requestAnimationFrame(checkAutoSlide);
                    },
                    onEnd: (evt) => {
                        isDraggingLead = false;
                        document.getElementById('kanban-board').classList.remove('no-snap');
                        const next = evt.to.dataset.status; const prev = evt.from.dataset.status; const id = evt.item.dataset.id;
                        if (next !== prev) {
                            const ls = db.getLeads(); const l = ls.find(x => x.id === id);
                            if(l) { 
                                l.status = next; db.saveLeads(ls); 
                                db.addInteraction({ id: crypto.randomUUID(), leadId: id, type: 'Note', content: `Moved ${prev} -> ${next}`, timestamp: Date.now() }); 
                                if(next === LeadStatus.WON) db.createClient(l); 
                                autoSync();
                            }
                        }
                    }
                });
            });
            lucide.createIcons();
        }

        function renderTasks() {
            const tasks = db.getTasks();
            document.getElementById('main-content').innerHTML = `
                <div class="p-4 md:p-10 w-full max-w-4xl mx-auto pb-20">
                    <h1 class="text-3xl font-bold mb-8">Tasks</h1>
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                        <form onsubmit="addTask(event)" class="p-4 bg-slate-50 border-b border-slate-100 flex gap-2">
                            <input id="task-in" required placeholder="New task..." class="flex-1 px-4 py-2 border rounded-xl outline-none">
                            <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded-xl font-bold">Add</button>
                        </form>
                        <div class="divide-y divide-slate-50">
                            ${tasks.map(t => `<div class="p-4 flex items-center gap-4 hover:bg-slate-50">
                                <button onclick="toggleTask('${t.id}')" class="w-6 h-6 rounded-full border-2 flex items-center justify-center ${t.isCompleted ? 'bg-blue-500 border-blue-500 text-white' : 'border-slate-300'}">${t.isCompleted ? '✓' : ''}</button>
                                <span class="flex-1 ${t.isCompleted ? 'line-through text-slate-400' : 'text-slate-800'}">${t.title}</span>
                            </div>`).join('')}
                        </div>
                    </div>
                </div>`;
            lucide.createIcons();
        }

        function renderClients() {
            const clients = db.getClients();
            document.getElementById('main-content').innerHTML = `
                <div class="p-4 md:p-10 w-full max-w-6xl mx-auto pb-20">
                    <h1 class="text-3xl font-bold mb-8">Clients</h1>
                    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                        ${clients.map(c => `
                            <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                                <h3 class="font-bold text-lg">${c.name}</h3>
                                <p class="text-sm text-slate-500 mt-1">${c.serviceType}</p>
                                <p class="text-xs text-slate-400 mt-4">Renewal: ${new Date(c.renewalDate).toLocaleDateString()}</p>
                            </div>
                        `).join('')}
                    </div>
                    ${clients.length === 0 ? '<p class="text-slate-300 text-center py-20">No active clients yet.</p>' : ''}
                </div>`;
            lucide.createIcons();
        }

        function handleRoute() { renderNav(); const h = location.hash || '#dashboard'; if(h === '#leads') renderLeads(); else if(h === '#tasks') renderTasks(); else if(h === '#clients') renderClients(); else renderDashboard(); }
        window.onclick = (e) => { if(e.target.dataset.close) closeModal(e.target.dataset.close); };
        window.onhashchange = handleRoute;
        window.onload = handleRoute;

        function closeModal(id) { document.getElementById(id).classList.add('hidden'); document.body.style.overflow = ''; }
        function openAddModal() { document.getElementById('add-modal').classList.remove('hidden'); }
        function openAgentModal() { document.getElementById('agent-modal').classList.remove('hidden'); if(!document.getElementById('agent-chat-area').children.length) addAgentMsg("Hello! I'm Jerry."); }
        function switchTab(t) { 
            const m = document.getElementById('tab-manual'), i = document.getElementById('tab-import'), mf = document.getElementById('add-lead-form'), ifr = document.getElementById('import-form');
            if(t === 'manual') { mf.classList.remove('hidden'); ifr.classList.add('hidden'); m.className = "flex-1 py-4 text-sm font-bold text-blue-600 border-b-2 border-blue-600"; i.className = "flex-1 py-4 text-sm font-bold text-slate-400 border-b-2 border-transparent"; }
            else { mf.classList.add('hidden'); ifr.classList.remove('hidden'); i.className = "flex-1 py-4 text-sm font-bold text-blue-600 border-b-2 border-blue-600"; m.className = "flex-1 py-4 text-sm font-bold text-slate-400 border-b-2 border-transparent"; }
        }

        document.getElementById('add-lead-form').onsubmit = (e) => {
            e.preventDefault(); const fd = new FormData(e.target);
            db.addLead({ id: crypto.randomUUID(), name: fd.get('name'), phone: fd.get('phone'), email: fd.get('email'), company: fd.get('company'), status: LeadStatus.NEW, createdAt: Date.now() });
            e.target.reset(); closeModal('add-modal'); renderLeads();
        };

        function handleFileUpload(input) {
            const reader = new FileReader(); reader.onload = (e) => {
                const wb = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
                window.pData = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                document.getElementById('import-count').innerText = window.pData.length; document.getElementById('import-preview').classList.remove('hidden');
            }; reader.readAsArrayBuffer(input.files[0]);
        }
        function confirmImport() {
            if(!window.pData) return; 
            const leads = db.getLeads();
            window.pData.forEach(r => {
                leads.push({ id: crypto.randomUUID(), name: r.Name || r['Business Name'] || 'Lead', phone: r.Phone || r['Mobile Number'] || '', status: LeadStatus.NEW, createdAt: Date.now() });
            });
            db.saveLeads(leads);
            autoSync();
            alert(`Imported ${window.pData.length} leads`); closeModal('add-modal'); handleRoute();
        }

        function addTask(e) { e.preventDefault(); const t = document.getElementById('task-in').value; if(!t) return; const ts = db.getTasks(); ts.push({ id: crypto.randomUUID(), title: t, isCompleted: false }); db.saveTasks(ts); renderTasks(); }
        function toggleTask(id) { const ts = db.getTasks(); const t = ts.find(x => x.id === id); if(t) t.isCompleted = !t.isCompleted; db.saveTasks(ts); renderTasks(); }

        function openLeadModal(id) {
            currentLeadId = id;
            renderLeadModalContent();
            document.getElementById('lead-modal').classList.remove('hidden');
        }

        function renderLeadModalContent() {
            const l = db.getLeads().find(x => x.id === currentLeadId); if(!l) return;
            const ints = db.getInteractions().filter(x => x.leadId === currentLeadId).sort((a,b) => b.timestamp - a.timestamp);
            const rawPhone = l.phone.replace(/\D/g, '');
            const waPhone = rawPhone.length === 10 ? '91' + rawPhone : rawPhone;

            document.getElementById('lead-modal-content').innerHTML = `
                <div class="text-center p-6 bg-slate-50 rounded-2xl mb-6 relative">
                    <div class="w-20 h-20 bg-blue-500 text-white rounded-full flex items-center justify-center text-3xl font-bold mx-auto mb-4">${l.name[0]}</div>
                    <h2 class="text-2xl font-bold">${l.name}</h2>
                    <p class="text-slate-500 text-sm font-medium mb-4">${l.company || ''}</p>
                    <div class="flex gap-2">
                        <a href="tel:${l.phone}" onclick="logAction('${l.id}', 'Call')" class="flex-1 py-2 bg-blue-600 text-white rounded-lg flex items-center justify-center gap-2 text-sm font-bold shadow-md shadow-blue-100"><i data-lucide="phone" class="w-4 h-4"></i> Call</a>
                        <a href="https://wa.me/${waPhone}" onclick="logAction('${l.id}', 'WhatsApp')" target="_blank" class="flex-1 py-2 bg-emerald-500 text-white rounded-lg flex items-center justify-center gap-2 text-sm font-bold shadow-md shadow-emerald-100"><i data-lucide="message-circle" class="w-4 h-4"></i> WA</a>
                        <a href="mailto:${l.email}" onclick="logAction('${l.id}', 'Email')" class="flex-1 py-2 bg-slate-800 text-white rounded-lg flex items-center justify-center gap-2 text-sm font-bold shadow-md"><i data-lucide="mail" class="w-4 h-4"></i> Email</a>
                    </div>
                </div>

                <div class="mb-6">
                    <p class="text-xs font-bold text-slate-400 uppercase mb-2">New Note</p>
                    <div class="flex gap-2">
                        <input id="note-in" class="flex-1 px-4 py-3 bg-slate-50 border border-slate-100 rounded-xl outline-none focus:ring-2 focus:ring-blue-100 text-sm" placeholder="Add a note...">
                        <button onclick="addNote()" class="bg-blue-600 text-white px-4 rounded-xl"><i data-lucide="save"></i></button>
                    </div>
                </div>

                <div class="space-y-4">
                    <p class="text-xs font-bold text-slate-400 uppercase">Recent Activity</p>
                    <div class="space-y-3">
                        ${ints.map(i => `
                            <div class="p-3 bg-white border border-slate-100 rounded-xl shadow-sm text-sm">
                                <div class="flex justify-between items-center mb-1">
                                    <span class="font-bold text-[10px] text-blue-500 uppercase">${i.type}</span>
                                    <span class="text-[9px] text-slate-400">${new Date(i.timestamp).toLocaleString()}</span>
                                </div>
                                <p class="text-slate-600 text-xs">${i.content}</p>
                            </div>
                        `).join('')}
                    </div>
                    ${!ints.length ? '<p class="text-slate-300 text-center text-sm italic">No history yet.</p>' : ''}
                </div>`;
            lucide.createIcons();
        }

        let currentLeadId = null;
        function addNote() {
            const cin = document.getElementById('note-in');
            const val = cin.value.trim();
            if(!val || !currentLeadId) return;
            db.addInteraction({ id: crypto.randomUUID(), leadId: currentLeadId, type: 'Note', content: val, timestamp: Date.now() });
            cin.value = '';
            renderLeadModalContent();
        }

        function logAction(id, type) {
            db.addInteraction({ id: crypto.randomUUID(), leadId: id, type: type, content: `Logged ${type} action`, timestamp: Date.now() });
            if(id === currentLeadId) renderLeadModalContent();
        }

        function addAgentMsg(t, u=false) {
            document.getElementById('agent-chat-area').insertAdjacentHTML('beforeend', `<div class="flex ${u?'justify-end':'justify-start'} animate-fade-in"><div class="max-w-[85%] p-3 rounded-2xl text-sm ${u?'bg-blue-600 text-white':'bg-white text-slate-700 shadow-sm border'}">${t}</div></div>`);
            document.getElementById('agent-chat-area').scrollTop = 9999;
        }
        function resetAgentOptions() {
            const opts = [
                {id:'sum', label:'Status Summary'}, 
                {id:'new', label:'Show New'}, 
                {id:'sync', label:'Cloud Refresh'},
                {id:'over', label:'Overdue Tasks'}
            ];
            document.getElementById('agent-options').innerHTML = opts.map(o => `<button onclick="handleAgentQuery('${o.id}','${o.label}')" class="px-3 py-1.5 bg-slate-50 border border-slate-200 hover:bg-slate-100 rounded-full text-[11px] font-bold transition-transform active:scale-95">${o.label}</button>`).join('');
        }
        function handleAgentQuery(id, label) {
            addAgentMsg(label, true);
            setTimeout(() => {
                let r = "I'm checking on that for you...";
                if(id === 'sum') {
                    const leads = db.getLeads();
                    r = `You currently have ${leads.length} total leads in your pipeline.`;
                }
                else if(id === 'new') {
                    const count = db.getLeads().filter(x=>x.status===LeadStatus.NEW).length;
                    r = `There are ${count} leads in 'New' status waiting for contact.`;
                }
                else if(id === 'sync') {
                    r = "Initiating cloud pull... I'll update the list as soon as data arrives.";
                    fetchLeadsFromSheets(false);
                }
                else if(id === 'over') {
                    const overdue = db.getTasks().filter(t => !t.isCompleted && new Date(t.dueDate) < new Date());
                    r = overdue.length ? `You have ${overdue.length} overdue tasks that need attention.` : "No overdue tasks! You're all caught up.";
                }
                addAgentMsg(r);
            }, 600);
        }
        resetAgentOptions();
    </script>
</body>
</html>
